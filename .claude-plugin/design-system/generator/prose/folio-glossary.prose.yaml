# folio-glossary.prose.yaml — opus-authored prose manifest for the glossary-pack (instance #1)
# inject-prose.sh (core, 無改変) が data-slot-id 付きの空スロットへ各値を HTML escape して注入する。
# キー集合は assemble-glossary.sh が emit する data-slot-id 集合と *完全一致* (cover-summary + plain-<slug> × 33)。
#
# 人間層 (dual-audience の human side): 各 plain-<slug> は machine 層の formal_def (vocabulary.yaml の
# 技術定義) を *非エンジニアに届く平易な言い換え* にしたもの。専門語を避け、何のための言葉かを日常語で説明する。
# 機械層の formal_def とは別の prose で、 fidelity (意味の忠実さ・捏造の不在) は admin の独立 ceiling が検査する。
#
# 規律: 各値は単一行 (tab/改行禁止)・空値禁止 (inject-prose.sh が fail-closed)。HTML 特殊文字は inject が escape。
slots:
  cover-summary: "この用語集は、 folio という仕組みを動かすために使う言葉を 1 か所に集めて、 だれが読んでも意味がぶれないようにするための辞書です。 各語には、 専門知識がなくても読める平易な説明と、 機械が参照するための正式な記録 (正式名・場所・関連する決め事) の両方が載っています。 folio 自身の言葉を folio のやり方で記述した、 自己適用 (dogfood) の一例でもあります。"
  plain-spec: "「何を作りたいか・どうあるべきか」という設計の意図そのものを書き残した文書です。 どう実装するか (手順) や、 なぜそう決めたか (理由) とは紙を分けて、 目的だけをはっきり書きます。"
  plain-ADR: "ある設計上の判断について「何を決めたか・なぜそう決めたか・他の案と比べてどうか」を 1 件ずつ記録した文書です。 一度書いたら後から書き換えず、 当時の判断の記録として残します。"
  plain-constitution: "folio が絶対に守ると約束した、 いちばん上位の決めごと集です。 ここを変えるには必ず人の承認が要り、 ほかの決めごととは別格に扱われます。"
  plain-invariant: "文書がいつでも必ず満たしていなければならない条件のことです。 この条件は機械による自動チェックで守られ続けます。"
  plain-inventory: "folio が持つすべての設計文書を機械が自動で読み取って作る一覧表です。 どこに何があるかを機械が把握するための目録になります。"
  plain-prime: "目録から要点だけを抜き出した短い要約を作る機能です。 AI に「今これだけ知っておいて」と最小限の情報を渡すために使います。"
  plain-cluster: "設計文書を中身の種類ごと (設計意図・決定の記録・調査) に分けて入れておく、 引き出しのようなフォルダのことです。"
  plain-vocabulary: "folio で使う言葉の正式な意味を 1 か所にまとめた、 大もとの定義集です。 この用語集ページもここから作られます。"
  plain-SSoT: "ある事柄について「正しい定義はここ 1 か所だけ」と決めた基準点のことです。 他の場所はそこを参照するだけにして、 食い違いを防ぎます。"
  plain-dual-audience: "1 つの文書を、 人が読んで分かる説明と、 機械が正確に読み取れる記録の両方を兼ねるように作るやり方です。 同じ内容を 2 つの読み手に同時に届けます。"
  plain-data-audience: "文書の各部分が「人向け」か「機械向け」かを示す目印です。 この目印で、 人が読む説明と機械が読む記録をきれいに分けます。"
  plain-EARS: "要件 (守るべきこと) を書くときの、 決まった 5 つの型のことです。 「いつ守るのか」を型でそろえることで、 あいまいさをなくします。"
  plain-essence: "ある項目の定義場所にすでに書いてある内容を使い回して作る、 短い要約のことです。 説明を新しく書き起こさず、 元の言葉を再利用します。"
  plain-dogfood: "folio 自身を、 folio が定めたやり方や道具で作って確かめることです。 自分のルールが実際に役立つかを、 自分で使って検証します。"
  plain-floor: "機械が自動でできる品質チェックの層です。 ここは「最低限ここは必ず守る」という下限を、 機械的に強制します。"
  plain-ceiling: "機械では判断しきれない、 意味や読みやすさといった品質を、 AI のレビューで補う層です。 機械チェックの上限を超えた部分を見ます。"
  plain-xref: "文書の中から、 別の決めごとや項目へ張るリンクのことです。 リンクの抜けがないかを機械が自動でチェックして保証します。"
  plain-defined-object: "固有の名前 (ID) を持っていて、 他から参照できる項目のことです。 原則・要件・決定・ルールの各番号などが当てはまります。"
  plain-canonical-name: "1 つの物事に対して「正式にはこう呼ぶ」と決めた、 ただ 1 つの呼び名です。 表記のゆれや言い換えを禁じて、 言葉を一貫させます。"
  plain-progressive-disclosure: "情報を一度に全部見せず、 要約からだんだん詳しくたどれるように段階的に開く見せ方です。 まず要点、 次に概要、 最後に全文の順です。"
  plain-caller-marker: "設計文書を勝手に編集できないよう見張る仕組みです。 決められた正しい入口を通ったときだけ編集を許可します。"
  plain-gate: "folio の自動チェックが文書一式にかける、 検査の 1 単位です。 違反でストップさせるものと、 注意だけ出すものの 2 種類があります。"
  plain-marker: "「ここからここまではこういう扱い」という境界を、 文書の中に書いておく目印です。 中身を機械が管理するのか人が書くのかを区別します。"
  plain-golden: "正解とする出力をファイルとして保存しておき、 後の出力と 1 文字ずつ比べて、 変わっていないかを確かめる基準のことです。"
  plain-keystone: "目印などの前提がない対象は、 あえて検査せず素通りさせて全体をきれいに保つ、 という考え方です。 誤った警告を出すより、 検査しない方を選びます。"
  plain-frozen: "正式に決まった後はもう本文を書き換えない、 歴史の記録としての文書のことです。 実際とのずれは別の文書に記録します。"
  plain-chrome: "すべてのページに自動で付く、 ナビゲーションの枠 (リンクや目次など) のことです。 手で書き換えても、 作り直すと上書きされます。"
  plain-curated-region: "目印の内側を人が自由に書き、 その内容を folio が壊さずそのまま保つ領域のことです。 自動で付く枠とは、 中身を持つ向きが逆です。"
  plain-remediate: "チェックで見つかった問題を直す操作や道具のことをまとめてこう呼びます。 見た目の作り直しとリンクの埋め込みで、 担当する道具が分かれます。"
  plain-fold: "クリックで開閉して折りたためる表示のことです。 機械向けの細かい記録や長い一覧をふだんは畳んでおき、 人向けの要点をいつも見えるようにします。"
  plain-sandbox: "決まった手順で動作を試す検証の仕組みです。 部品を本番と切り離した安全な場所で、 想定の入力を使って単体で確かめます。"
  plain-harness: "検証の手順を実際に走らせて、 結果が正しいかを判定する実行役のプログラムです。 検査の種類ごとに走らせ方を使い分けます。"
  plain-landing: "folio の入口となるトップページの型です。 ひとことの見出しから、 進む先のボタン、 読者別の案内カード、 一覧へと並ぶ構成になっています。"
