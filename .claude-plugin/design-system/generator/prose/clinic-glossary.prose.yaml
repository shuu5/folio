# clinic-glossary.prose.yaml — opus-authored prose manifest for the glossary-pack (instance #2 / clinic)
# inject-prose.sh (core, 無改変) が data-slot-id 付きの空スロットへ各値を HTML escape して注入する。
# キー集合は assemble-glossary.sh が emit する data-slot-id 集合と *完全一致* (cover-summary + plain-<slug> × 25)。
#
# 人間層 (dual-audience の human side): 各 plain-<slug> は machine 層の formal_def (clinic suite contract の
# canonical 定義) を *非エンジニア (院長・受付スタッフ) に届く平易な言い換え* にしたもの。専門語を避け、
# 何のための言葉か・放っておくと何が困るかを日常語で説明する。機械層の formal_def とは別の prose で、
# fidelity (意味の忠実さ・捏造の不在) は admin の独立 ceiling が検査する。
#
# 規律: 各値は単一行 (tab/改行禁止)・空値禁止 (inject-prose.sh が fail-closed)。HTML 特殊文字は inject が escape。
slots:
  cover-summary: "この用語集は、 クリニック予約システムの文書一式 (要件・設計判断・調査・構成・テスト) で使う言葉を 1 か所に集めて、 だれが読んでも意味がぶれないようにするための辞書です。 各語には、 院長や受付スタッフなど専門知識のない方でも読める平易な説明と、 機械が参照するための正式な記録 (英語名・分類・関連文書) の両方が載っています。"
  plain-appointment-slot: "「この日のこの時間に、 何人まで診られるか」を区切った予約の入れ物です。 予約はこの枠単位で受け付け、 入れる人数を超えると満枠になります。"
  plain-double-booking: "同じ枠に 2 人以上の予約を入れてしまう事故のことです。 起きると、 来院した患者さんを待たせたりお断りすることになり、 信頼を損ないます。 この文書一式の仕組みは、 これを起こさないことを最優先にしています。"
  plain-fully-booked: "その枠に入れる人数がいっぱいになり、 これ以上予約を受けられない状態です。 満枠の枠には新しい予約が入らないように守られます。"
  plain-no-show: "予約したのに連絡なく来院されないことです。 その枠は空いたまま無駄になってしまうため、 事前の思い出し通知で減らすことを目指します。"
  plain-reminder-notification: "予約日が近づいたときに「予約がありますよ」とお知らせする通知です。 うっかり忘れによる無断キャンセルを減らすために送ります。"
  plain-check-in: "予約した患者さんが実際に来院し、 受付を済ませて「来ました」と記録することです。 この記録があると、 来院の実績を正しく把握できます。"
  plain-identity-verification: "予約や受付の相手が、 本当に予約したご本人かを確かめることです。 別人との取り違えや、 他人に情報が漏れる事故を防ぎます。"
  plain-clinic-holiday: "クリニックが診療をお休みする日のことです。 お休みの日には予約を受け付けません。"
  plain-outside-clinic-hours: "その日の診療を行っていない時間帯のことです。 診療時間の外には予約を受け付けません。"
  plain-clinic-calendar: "診療枠と休診日を管理している、 すでにクリニックにある予定表のことです。 「いつ空いているか」の正しい答えは、 いつもこの予定表から取ります。"
  plain-sensitive-personal-information: "受診歴や病歴のように、 万一漏れるとご本人の不利益がとても大きい個人情報のことです。 ふつうの個人情報より一段と慎重に扱います。"
  plain-appi: "個人情報の取り扱い方を定めた日本の法律 (個人情報保護法) の略称です。 患者さんの情報を扱うこのシステムは、 この法律を守って作られます。"
  plain-optimistic-locking: "ふだんは鍵をかけずに処理を進め、 予約を確定する瞬間にだけ「他の人とぶつかっていないか」を確かめるやり方です。 ぶつかったときは後から来た側だけが失敗し、 やり直しになります。"
  plain-pessimistic-locking: "処理を始める前から対象に鍵をかけて、 終わるまで他の人を入れないやり方です。 確実ですが、 鍵をかけている間はその枠がふさがったままになります。"
  plain-conditional-update: "「空きが 1 つ以上あるときだけ 1 つ減らす」のように、 条件が成り立つ場合だけ記録を書き換える、 ひとかたまりの操作です。 条件と書き換えが同時に行われるので、 割り込まれて数が狂う心配がありません。"
  plain-transaction: "「全部成功した」か「何もしなかった」かのどちらかにしかならない、 途中で分けられないひとまとまりの処理です。 中途半端な状態が残らないので、 記録が食い違いません。"
  plain-hotspot: "申し込みや処理が一箇所に集中して、 混み合って詰まりやすくなる場所のことです。 人気の診療枠に予約が殺到するときなどに起きます。"
  plain-throughput: "決まった時間内にさばける処理の量のことです。 この量が大きいほど、 予約が集中するピーク時でも詰まりにくくなります。"
  plain-integration-adapter: "外部のシステム (診療カレンダーなどの外部システム) との間に置く「翻訳役」の部品です。 外部の都合や形式の違いをここで吸収して、 システムの中まで持ち込ませないようにします。"
  plain-test-case: "「この状況で・こう操作したら・こうなるはず」を 1 件ずつにまとめた、 正しさの確かめ方の単位です。 1 件ずつ独立しているので、 どこが合格でどこが不合格かがはっきりします。"
  plain-acceptance-criteria: "「これが満たせていれば合格」と、 要件ごとにあらかじめ決めておく合格条件のことです。 後から「できたつもり」のずれが起きないように、 先に確かめどころを固定します。"
  plain-traceability: "どのテストが、 どの要件・どの合格条件を確かめているのかを、 たどれるようにつないでおくことです。 つながりを見れば、 確かめ漏れがないかを一覧で点検できます。"
  plain-happy-path: "想定どおりに正しく使われたときに、 期待どおり動くことを確かめるテストのことです。 まず「うまくいく道筋」が通ることを保証します。"
  plain-error-path: "間違った操作や同時の取り合いなど、 困った状況でも安全に振る舞うことを確かめるテストのことです。 「うまくいかないとき」に壊れないことを保証します。"
  plain-boundary-value: "「残り 0 人」「ちょうど満枠」のような境目の値で、 正しく振る舞うかを確かめるテストのことです。 間違いは境目でいちばん起きやすいため、 そこを狙って確かめます。"
