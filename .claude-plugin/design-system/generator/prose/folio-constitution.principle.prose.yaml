# folio engine B4 (folio-igv) — principle-pack prose manifest (③「読みやすさの足場」)
#
# opus 著作物。決定的 assembler が空で出力した data-prose-slot に inject-prose.sh が
# HTML escape して注入する。slot-id ↔ 散文の 1:1 対応 (集合一致を inject が fail-closed 検査)。
#
# 各値は機械 SSoT (contract/folio-constitution.principle.yaml) 接地。捏造/歪曲/脱落は fidelity ceiling
# (fidelity-principle 相当の機械 SSoT 突合 + persona-walk) の検査対象。値は単一行 (tab/改行禁止)。
#   - 章リードは各章の地の文 (Always/Ask-first/Never/versioning/amendment/inbound/glossary) だけに接地する。
#   - plain-P-x は各原則の heading/statement だけに接地し、 SSoT に無い義務や因果を新造しない。

slots:
  # ---- 表紙: この憲法が約束すること (principles + amendment 接地) ----
  cover-summary: "folio が拠って立つ 14 の不変原則を、 いつも守る (9)・変える前に確認する (3)・絶対にやらない (2) の 3 段にまとめた憲法です。 各原則の改訂は ADR と版に必ず残り、 黙って変わることはありません。"

  # ---- 章リード (各章の導入・章構成接地) ----
  chapter-lead-01: "まず、 例外なく常に守る 9 つの原則です。 spec の書き方・置き場所・人にも読める形など、 folio の土台になる約束をここで示します。"
  chapter-lead-02: "次は、 利用者の承認を取ってからなら変えてよい 3 つの原則です。 勝手に変えず、 必ず確認を挟むことが共通点です。"
  chapter-lead-03: "最後は、 踏み越えてはいけない 2 つの原則です。 守りの最後の線として、 例外を認めません。"
  chapter-lead-04: "原則をどう変えると版がどう上がるかを示します。 追加・削除・段の変更は大きく、 文言の手直しは中くらい、 誤記直しは小さく — という対応です。"
  chapter-lead-05: "原則を変えるときの手順です。 提案・承認・ADR 作成・編集と版上げ・レビューの 5 ステップで、 変更が必ず記録に残るようにします。"
  chapter-lead-06: "原則は照会の終わりにあたり、 他の文書から参照されるだけで自分からは他を指しません。 ここでは、 どの文書がどの原則を根拠にしているか (受ける照会) だけを示します。"
  chapter-lead-07: "本文に出てくる専門語を、 やさしい言葉で説明します。 読んでいて分からない言葉が出てきたら、 ここに戻れます。"

  # ---- 各原則のやさしい一言 (heading/statement 接地・新たな義務を足さない) ----
  plain-P-1: "spec はいまのコードの写しではなく、 目指すべき設計の最終形を「こうあるべき」と書いたものです。 設計と実装のズレがあっても異常ではなく、 その点検は AI との対話 (P-8) で行います。"
  plain-P-2: "設計意図の文書はすべて HTML で書きます。 Markdown や YAML を使ってよいのは README・AI 向け指示・設定ファイルなど外部のルールに従う一部に限られ、 その範囲は別の spec が定めます。"
  plain-P-3: "設計意図の文書には「どう作るか」という土台依存の手順を書きません。 別の AI 環境へ移したときに書き直しが要るなら、 それは手順が紛れ込んでいる印です。"
  plain-P-4: "spec の本文は「いまこうである」という現在形で書きます。 過去の経緯・未来の予定・その時々の作業メモは spec に書かず、 ADR・探索ノート・変更履歴のレビューに分けます。"
  plain-P-5: "同じものを指すのに複数の呼び名を使いません。 正式名称と、 使ってはいけない別名は、 各プロジェクトの用語ファイルで宣言します。"
  plain-P-6: "spec の各ファイルはどこかから必ずリンクされている状態にします。 入口となる README だけが例外で、 リンク切れや孤立ファイルは自動チェックで 0 にします。"
  plain-P-7: "設計意図の置き場所は 3 つに役割を分け内容を混ぜません — 何を作るか (WHAT)・なぜそう決めたか (WHY)・反映前の探索。 実際に動く手順や検証はこの場所の外に置きます (P-13)。"
  plain-P-13: "実際に動くコードとその検証は設計意図の場所の外に置きます。 要件は変わらない ID で検証に結びつき、 その ID が設計と実装をつなぐ唯一の確かな線です。 検証は文書自身の正しさと実装が要件を満たすかの 2 層です。"
  plain-P-14: "folio の文書と生成物は、 機械が読めることと同じ重みで人が読めることを保ちます。 ページごとに主な読み手が決められ、 その人が用を足せる形で示されます。 読みやすさも検証の対象です。"
  plain-P-8: "AI は実装案を出すとき、 spec や憲法との食い違いを自然な言葉で利用者に説明する責任があります。 この説明が、 設計と実装のズれを見つける仕組みになります。"
  plain-P-9: "各プロジェクト側の設定ファイルや用語ファイルを変えるときは、 必ず利用者の承認をもらいます。"
  plain-P-10: "この憲法そのものを変えるとき (原則の追加・削除・文言変更・段の変更) は、 利用者の承認が必須です。 版の上げ方は §5 に従います。"
  plain-P-11: "P-3 を「絶対禁止」の段へ引き上げた規律です。 特定のツール名・パス・OS 固有のコマンドなどの具体は本文に直接書かず、 実装の足回りや AI 向け指示ファイルに隔離します。"
  plain-P-12: "folio 本体 (憲法 + ルール + 自己仕様) と実装の足回りはひとまとめで配ります。 利用する各プロジェクトは別のリポジトリとして展開し、 folio の中には同居させません。"

  # ---- 版/手順の平易説明 (versioning/amendment 接地) ----
  versioning-plain: "ざっくり言うと、 原則そのものを増減したり段を変えると大きな版上げ、 言い回しの調整は中くらい、 誤記直しは小さな版上げになります。"
  amendment-plain: "提案して承認をもらい、 ADR に決定を残し、 憲法を直して版を上げ、 最後にレビューで記録を確定します。 どの段階も飛ばさず、 変更が必ず追えるようにします。"
