# folio engine B3 (folio-ar1) — research-pack prose manifest (③「読みやすさの足場」)
#
# opus 著作物。決定的 assembler が空で出力した data-prose-slot に inject-prose.sh が
# HTML escape して注入する。slot-id ↔ 散文の 1:1 対応 (集合一致を inject が fail-closed 検査)。
#
# 各値は機械 SSoT (contract/clinic-double-booking.research.yaml) 接地。捏造/歪曲/脱落は fidelity ceiling
# (fidelity-srs 相当の機械 SSoT 突合 + persona-walk) の検査対象。値は単一行 (tab/改行禁止)。
#   - 章リードは各章の地の文 (question/findings/approaches/open_questions/outcome) だけに接地する。
#   - plain-APx は各 approach の name/summary/assessment だけに接地し、 SSoT に無い因果機構を新造しない。

slots:
  # ---- 表紙: この調査がたどり着いたこと (question + outcome 接地) ----
  cover-summary: "同じ診療枠に複数の患者がほぼ同時に申し込んでも二重予約させない確定方式を、 決めずに洗い出した調査記録です。 楽観的な確定・悲観ロック・直列キューの 3 方式を比較し、 後続の設計判断 ADR-CLINIC-0001 へ引き継ぎました。"

  # ---- 章リード (各章の導入・章構成接地) ----
  chapter-lead-01: "この調査が何を確かめようとしているのかを、 中心の問いと範囲で先に共有します。 調べるのは「同時に申し込んでも二重予約させない確定方式があるか・安全と速さを両立できるか」で、 予約画面の見た目や決済・キャンセル待ちは対象外です。"
  chapter-lead-02: "方式を比べる前に、 調査でわかった事実を 3 つ並べます。 同時申込がふつうに起きること、 アプリ側の事前確認だけでは隙が残ること、 安全に倒すと速さを失いやすいこと — これが判断の手がかりになります。"
  chapter-lead-03: "確定方式の候補を 3 つ並べ、 それぞれの評価と、 後続の設計判断 (ADR) のどの選択肢につながるかを示します。 ここが research がまだ「決めない」段階で、 各方式を測って見比べる中心です。"
  chapter-lead-04: "この調査では結論を出さなかった論点を、 正直に残します。 満枠をどの粒度で案内するか・移行コストはどれくらいか — これらは後続の設計判断や実装で引き取ることになります。"
  chapter-lead-05: "この調査がどこで決着したかを示します。 research は方式を決めませんが、 比較の結果は後続の設計判断 ADR-CLINIC-0001 へ前方参照でつながり、 そこで採用が決まりました。"
  chapter-lead-06: "本文に出てくる専門語を、 やさしい言葉で説明します。 読んでいて分からない言葉が出てきたら、 ここに戻れます。"

  # ---- 各方式のやさしい一言 (name/summary/assessment 接地) ----
  plain-AP1: "ふだんは止めずに進め、 確定の瞬間だけ「残りが 1 以上なら 1 減らす」と条件付きで書き換えます。 ぶつかった片方だけが失敗し、 競合した枠だけが一瞬調整されるので速いのが持ち味です。"
  plain-AP2: "枠を選んだ瞬間にその枠を押さえ、 予約が終わるかタイムアウトするまで他の人を入れません。 確実ですが、 患者が迷って離脱すると枠が長くふさがります。"
  plain-AP3: "同じ枠への申込を一列に並べ、 先頭から順番に一件ずつ確定可否を判断します。 同時には処理されませんが、 人気の枠では行列が一点に集中します。"

  # ---- 調査の行き先: plain (outcome.note の言い換え) ----
  outcome-plain: "この調査は方式を決めずに比較で終え、 後続の設計判断 ADR-CLINIC-0001 で楽観的な確定 (AP1 がつながる OPT1) を採用として決着しました。 未解決の問いはそちらへ引き継ぎます。"
