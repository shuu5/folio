# folio S4 generator — prose manifest (ADR-0042 §2.1 の③「読みやすさの足場」)
#
# opus 著作物。決定的 assembler が空で出力した data-prose-slot に inject-prose.sh が
# HTML escape して注入する。slot-id ↔ 散文の 1:1 対応 (集合一致を inject が fail-closed 検査)。
#
# 各値は機械 SSoT (contract/ec-checkout.srs.yaml) 接地:
#   - plain        = その要件/NFR の ears.response / target を非エンジニア向けに言い換え (情報を落とさない)
#   - rationale    = data-source が指す upper_needs (N-x) に接地した「なぜ要る」
#   - chapter-lead = その章が何を・なぜ示すかの導入 (章構成に接地)
#   - rtm-summary  = 派生数値 (req=10/need=3/iso=0/unv=0) を平易要約 (数値は data-derived と一致必須)
#   - cover-summary= goals 3 つ + title の 1 文約束
# 捏造/歪曲/脱落は fidelity ceiling (S5 / spec-review-fidelity) の検査対象。値は単一行 (tab/改行禁止)。

slots:
  # ---- 表紙: この文書が約束すること (goals 3 + title 接地) ----
  cover-summary: "カートの注文を、二重課金も売り越しも取りこぼしもなく「注文確定」まで確実に通しきること — それをシステムの約束として定める文書です。"

  # ---- 章リード (各章の導入・章構成接地) ----
  chapter-lead-01: "まず「これが起きたら失敗」という事故を 3 つ先に決めます。避けたい結果を共有してから要件を読むと、各要件が何を守るためのものか分かりやすくなります。"
  chapter-lead-02: "この文書がどこまでを対象にし(in)、何を対象外にするか(out)をはっきりさせ、関わる人やシステム(アクター)を一覧にします。範囲を先に区切ることで「これは別途」という認識のズレを防ぎます。"
  chapter-lead-03: "各要件は思いつきではなく、事業上のニーズ(経営方針・運営部・経理の要望)から来ています。この章はその出どころを示し、後のトレーサビリティ表で「どのニーズがどの機能になったか」を追えるようにします。"
  chapter-lead-04: "システムが「いつ・何をするか」を一つずつ定めます。各行はやさしい言い換えと「なぜ要る」の根拠付きです。在庫を確保→決済→確定という一連の流れが、連打や決済失敗でも崩れないように組んであります。"
  chapter-lead-05: "「どれくらい速く・落ちず・安全か」を、感覚ではなく数値で約束します。速さ・安定・処理量・安全の 4 点を、それぞれの測り方とセットで示します。"
  chapter-lead-06: "「完成した」と言える条件を、後から検証できる形で先に決めておきます。ここを満たせば合格、という判定の基準です。"
  chapter-lead-07: "事業ニーズ → 機能 → 受入基準 が抜け漏れなく全部つながっているかを一覧で確認します。どこかが切れていれば、根拠のない機能か、確かめようのない機能があるサインです。"
  chapter-lead-08: "設計を始める前から決まっている外枠(守るべき決まり)と、関係する法令をまとめます。これらは交渉の余地がない前提条件です。"
  chapter-lead-09: "本文に出てくる専門語を、やさしい言葉で説明します。読んでいて分からない言葉が出てきたら、ここに戻れます。"

  # ---- 機能要件: plain (response の言い換え) ----
  plain-FR1: "「注文確定」を押した瞬間に、その商品の在庫を「この人の分」として先に押さえ、それから支払いに進みます。"
  plain-FR2: "ボタンを何度連打しても、注文として扱うのは 1 回だけ。2 回目以降の確定要求は受け付けません。"
  plain-FR3: "決済が成功して初めて注文を正式に確定し、お客様に注文番号を発行します。"
  plain-FR4: "支払いが失敗したり返事が来ないときは、先に押さえた在庫を元に戻し、注文は作りません。"
  plain-FR5: "注文が確定したら、お客様に確認のメールを自動で送ります。"
  plain-FR6: "いったん確定した注文の中身は、後から書き換わりません。記録として固定します。"

  # ---- 機能要件: rationale (data-source = N-x に接地した「なぜ要る」) ----
  rationale-FR1: "在庫を先に押さえないと、同じ 1 個を 2 人に売ってしまう「売り越し」が起きます。欠品の謝罪や機会損失を避けるため(ニーズ N-2)、確保を決済より前に置きます。"
  rationale-FR2: "連打や再送で 2 回処理すると二重課金になり、クレームやチャージバック(カード会社経由の返金請求)を招きます。決済の信頼を守るため(ニーズ N-1)、確定は 1 回だけに制限します。"
  rationale-FR3: "決済成功の合図を受けて確実に確定・採番することで、入金があったのに注文が残らない「取りこぼし」を防ぎ、売上を確実に計上します(ニーズ N-3)。"
  rationale-FR4: "決済が通らなかったのに在庫を押さえたままだと、売れる在庫が減って売り越し・機会損失の原因になります。だから失敗時は在庫を元に戻します(ニーズ N-2)。"
  rationale-FR5: "注文確定をその場で確実に知らせ、購入者が「本当に買えたか」を確認できるようにします。結果が見えないことによる問い合わせやクレームを減らし、決済への信頼を守るためです(ニーズ N-1)。"
  rationale-FR6: "確定済みの注文を後から書き換え可能にすると、売上計上の根拠が揺らぎます。記録を固定することで、取りこぼしなく正しく計上できます(ニーズ N-3)。"

  # ---- 非機能要件: plain (target の言い換え・hero.qual 接地) ----
  plain-NFR1: "確定ボタンを押してから結果が出るまで、100 回中 95 回は 1 秒以内に収めます。"
  plain-NFR2: "サービスが使える時間の割合を、月あたり 99.9%(止まってよいのは月 約 43 分まで)に保ちます。"
  plain-NFR3: "セールのピーク時でも、1 分あたり 500 件の注文をさばけるようにします。"
  plain-NFR4: "お客様のカード番号を自社では一切持たず、決済代行に任せます。"

  # ---- RTM: 派生数値 (req=10/need=3/iso=0/unv=0) を平易要約 ----
  rtm-summary: "この表は、10 件すべての要件が 3 つの事業ニーズのどれかにつながり(出どころのない要件は 0 件)、かつすべてが受入基準で検証される(未検証は 0 件)ことを示します。つまり、根拠のない機能も、確かめようのない機能もありません。"
