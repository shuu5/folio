# folio engine 段階3 (folio-5uu) — architecture-description-pack prose manifest (③「読みやすさの足場」)
#
# opus 著作物。 決定的 assembler が空で出力した data-prose-slot に inject-prose.sh が HTML escape して注入する。
# slot-id ↔ 散文の 1:1 対応 (集合一致を inject が fail-closed 検査)。
#
# 各値は機械 SSoT (contract/clinic-architecture.arch.yaml) 接地。 捏造/歪曲/脱落は fidelity ceiling
# (fidelity-* lens + persona-walk) の検査対象。 値は単一行 (tab/改行禁止)。
#   - plain-ADx / rationale-ADx = ★fidelity ceiling の主対象。 当該 decision の title/summary と cross-doc 照会 (SRS 要件 /
#     ADR 判断 / principle 終端) だけに接地し、 SSoT に無い因果・採否理由を新造しない (S4 の rationale 捏造の教訓)。
#     ADR は「決める」文書、 arch は「構造の WHAT」ゆえ、 採否の比較検討は照会先 ADR に委ね、 ここでは再掲しない (案A)。

slots:
  # ---- 表紙: このアーキテクチャ記述が約束すること (cover-summary) ----
  cover-summary: "診療予約システムを 6 つの部品に分け、 一番こわい事故である二重予約 (同じ枠に 2 人) を仕組みとして起こさないように組み立てた全体像です。 何をどう分けたか・どう動くか・なぜそう決めたかを、 要件 (SRS-CLINIC-APPT) と設計判断 (ADR-CLINIC-0001) への照会つきでまとめます。"

  # ---- 章リード (各章の導入・章構成接地) ----
  chapter-lead-01: "まず、 このシステムが解こうとしている課題と、 関わる人・外部サービスをはっきりさせます。 一番こわいのは同じ枠に 2 人を入れる二重予約。 担当は空き確認から当日受付までで、 診察内容や会計は別の仕組みに任せます。"
  chapter-lead-02: "細かい部品を語る前に、 全体を貫く 4 つの設計方針を先に置きます。 安全を最優先しつつ、 速さを保ち、 情報の出どころを一つにし、 外部が落ちても止めない。 各方針には「なぜそうするか」を必ず添えます。"
  chapter-lead-03: "システムの中身を 6 つの部品に分け、 それぞれが何を担当し、 どうつながるかを図と表で示します。 中心にいるのは枠の空き数を持つ部品と、 取り合いをさばく部品です。"
  chapter-lead-04: "部品が「動いているとき」にどう連携するかを、 二重予約がいちばん起きやすい同時申込の場面で順を追って見ます。 取るのと空き確認を 1 つにまとめるのがポイントです。"
  chapter-lead-05: "ここがこの文書の核です。 何を決めたか・なぜその案かを示し、 それぞれの決定がどの要件 (SRS) を充足し、 どの設計判断 (ADR) を根拠にし、 どの原則に行き着くかを照会でつなぎます。 詳しい採否の比較は照会先の ADR にあります。"
  chapter-lead-06: "このシステムがどんな品質をどこまで目指すかを並べます。 最優先は二重予約 0 件。 そのほか応答の速さ・安定して使えること・集中に耐えること・情報を守ることを、 要件定義 (SRS) の対応番号つきで示します。"
  chapter-lead-07: "うまくいかないかもしれない点 (リスク) を正直に挙げ、 それぞれをどう抑えるかを書きます。 危険度の高いものから順に、 起きると何が困るか・どう備えるかを示します。"
  chapter-lead-08: "本文に出てくる専門語を、 やさしい言葉で説明します。 読んでいて分からない言葉が出てきたら、 ここに戻れます。"

  # ---- 各決定のやさしい一言 (plain-ADx・title/summary 接地) ----
  plain-AD-1: "2 人が同じ枠をほぼ同時に申し込んでも、 確定の瞬間に「残りが 1 以上のときだけ 1 減らす」確認を一度に行うので、 通るのは 1 件だけ。 もう一方には満枠と伝わり、 二重予約が起きません。"
  plain-AD-2: "空き枠や休診日の情報は診療カレンダーだけを正しい出どころにし、 連携アダプタ越しに参照します。 同じ情報をシステムの中にもう一つ持たないので、 食い違いが起きません。"
  plain-AD-3: "前日のリマインドは外部の通知サービスに任せ、 もしそれが送れなくても予約の受付自体は止めません。 送れなかった通知はあとで送り直します。"
  plain-AD-4: "予約のときと当日受付のときの両方で本人確認を行い、 別人の予約として処理しません。 確認に通らなければ確定させず差し戻します。"

  # ---- 各決定の「なぜその案か」(rationale-ADx・summary + cross-doc 接地・採否比較は ADR に委ねる) ----
  rationale-AD-1: "確認と確定を別々の操作にすると、 その隙に別の申込が割り込み二重予約が漏れます。 そこで確認と確定を一体の条件付き更新にまとめます。 この方式を選んだ比較検討の詳細は照会先の ADR-CLINIC-0001 に記録されており、 行き着く原則は安全優先 (PRIN-SAFETY-FIRST) です。"
  rationale-AD-2: "同じ情報を複数の場所に持つと、 必ずどこかで食い違いが生まれます。 出どころを診療カレンダー 1 か所に固定すれば矛盾の余地がなくなります。 外部との形式差は連携アダプタが吸収し、 システム内へ持ち込ませません。"
  rationale-AD-3: "通知は本来の予約受付の付随機能です。 外部サービスの一時障害で予約受付まで止めるのは本末転倒なので、 通知を切り離し、 失敗は再送で吸収します。 これは「落ちても止めない」という戦略に沿った判断です。"
  rationale-AD-4: "患者の取り違えは医療事故や情報漏えいに直結します。 予約と当日受付という二つの入口の両方で本人確認を必須にすることで、 別人の予約が通る経路を塞ぎます。 安全を性能より優先する原則に沿った判断です。"
