# folio engine B1 (folio-bwc) — ADR-pack prose manifest (③「読みやすさの足場」)
#
# opus 著作物。決定的 assembler が空で出力した data-prose-slot に inject-prose.sh が
# HTML escape して注入する。slot-id ↔ 散文の 1:1 対応 (集合一致を inject が fail-closed 検査)。
#
# 各値は機械 SSoT (contract/clinic-double-booking.adr.yaml) 接地。捏造/歪曲/脱落は fidelity ceiling
# (fidelity-srs 相当の機械 SSoT 突合 + persona-walk) の検査対象。値は単一行 (tab/改行禁止)。
#   - decision-rationale = ★fidelity ceiling の主対象。 context/drivers/options の記述だけに接地し、
#     SSoT に無い因果機構を新造しない (S4 の rationale-FR5 捏造の教訓)。

slots:
  # ---- 表紙: この判断が約束すること (decision + cross-doc 接地) ----
  cover-summary: "同じ診療枠に複数の患者がほぼ同時に申し込んでも、 確定するのは 1 件だけにする方式を選び、 SRS の「予約受付(FR2)」と「競合拒否(FR3)」を構造から支えることを定める設計判断記録です。"

  # ---- 章リード (各章の導入・章構成接地) ----
  chapter-lead-01: "なぜわざわざ確定方式を決めるのかを、 起きうる問題から説明します。 同時申込はふつうに起きること、 アプリ側の事前確認だけでは漏れること、 そして速さと安全を同時に満たす必要があることを共有します。"
  chapter-lead-02: "選択肢を評価するための「ものさし」を先に決めます。 二重予約をゼロにできるか、 ピーク時でも詰まらないか、 競合に負けた申込をはっきり満枠として返せるか — この 3 つの軸で各方式を測ります。"
  chapter-lead-03: "確定方式の候補を 3 つ並べ、 それぞれの利点と欠点を見比べます。 どれも二重予約は防げますが、 ふさがり方・詰まり方・運用コストが異なります。"
  chapter-lead-04: "ものさしに照らして選んだ方式と、 その判断が SRS のどの要件を支えるかを示します。 ここが他の文書 (SRS) とつながる照会の要です。"
  chapter-lead-05: "この判断を選んだことで何が良くなり、 代わりに何を引き受けるのかを、 良い面とトレードオフの両方で正直に並べます。"
  chapter-lead-06: "この ADR が版の系譜のどこに位置するか (現行か・置き換えられたか) と、 判断が最後に行き着く原則を示します。 原則はこれ以上は遡らない照会の終端です。"
  chapter-lead-07: "本文に出てくる専門語を、 やさしい言葉で説明します。 読んでいて分からない言葉が出てきたら、 ここに戻れます。"

  # ---- 各選択肢のやさしい一言 (name/summary 接地) ----
  plain-OPT1: "ふだんは止めずに進め、 確定の瞬間だけ「残りが 1 以上なら 1 減らす」と条件付きで書き換えます。 ぶつかった片方だけが失敗します。"
  plain-OPT2: "枠を選んだ瞬間にその枠を押さえ、 予約が終わるかタイムアウトするまで他の人を入れません。 確実ですが押さえている間ふさがります。"
  plain-OPT3: "同じ枠への申込を一列に並べ、 先頭から順番に一件ずつ確定可否を判断します。 同時には処理されませんが、 人気の枠で行列ができます。"

  # ---- 採用判断: plain (statement の言い換え) ----
  decision-plain: "予約の確定を「空き枠の確保」と一つの操作にまとめ、 残りが 1 以上のときだけ 1 減らします。 成功した一件だけを確定し、 残り 0 で失敗した申込は満枠として断ります。"

  # ---- ★採用判断: rationale (なぜこの選択肢か。 context/drivers/options だけに接地) ----
  decision-rationale: "事前確認と確定が分かれていると割り込みで二重予約が漏れる(CTX2)ため、 確認と確定を一つの操作にする方式が要ります。 楽観的な確定(OPT1)は競合した枠だけが一瞬調整されるので、 ピーク時でも詰まらず(DR2)二重予約をゼロにでき(DR1)、 負けた側を満枠として返せます(DR3)。 悲観ロック(OPT2)は離脱でふさがり詰まり、 直列キュー(OPT3)は人気の枠に行列が集中し運用も増えるため、 速さと安全を両立する最小の機構として OPT1 を選びます。"
