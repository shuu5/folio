# folio S4 generator — prose manifest (ADR-0042 §2.1 の③「読みやすさの足場」)
#
# ドメイン: クリニックの診療予約システム。
# opus 著作物。決定的 assembler が空で出力した data-prose-slot に inject-prose.sh が
# HTML escape して注入する。slot-id ↔ 散文の 1:1 対応 (集合一致を inject が fail-closed 検査)。
#
# 各値は機械 SSoT (contract/clinic-appointment.srs.yaml) 接地:
#   - plain        = その要件/NFR の ears.response / target を非エンジニア向けに言い換え (情報を落とさない)
#   - rationale    = data-source が指す upper_needs (N-x) に接地した「なぜ要る」
#   - chapter-lead = その章が何を・なぜ示すかの導入 (章構成に接地)
#   - rtm-summary  = 派生数値 (req=11/need=4/iso=0/unv=0) を平易要約 (数値は data-derived と一致必須)
#   - cover-summary= goals 3 つ + title の 1 文約束
# 捏造/歪曲/脱落は fidelity ceiling (S5 / fidelity-srs) の検査対象。値は単一行 (tab/改行禁止)。

slots:
  # ---- 表紙: この文書が約束すること (goals 3 + title 接地) ----
  cover-summary: "診療の予約を、同じ枠への二重予約も、来院忘れも、患者の取り違えも起こさずに「受け付ける」まで確実に通しきること — それをシステムの約束として定める文書です。"

  # ---- 章リード (各章の導入・章構成接地) ----
  chapter-lead-01: "まず「これが起きたら失敗」という事故を 3 つ先に決めます。避けたい結果を共有してから要件を読むと、各要件が何を守るためのものか分かりやすくなります。"
  chapter-lead-02: "この文書がどこまでを対象にし(in)、何を対象外にするか(out)をはっきりさせ、関わる人やシステム(アクター)を一覧にします。範囲を先に区切ることで「これは別の仕組み」という認識のズレを防ぎます。"
  chapter-lead-03: "各要件は思いつきではなく、現場のニーズ(院長方針・事務部・安全管理・運用部の要望)から来ています。この章はその出どころを示し、後のトレーサビリティ表で「どのニーズがどの機能になったか」を追えるようにします。"
  chapter-lead-04: "システムが「いつ・何をするか」を一つずつ定めます。各行はやさしい言い換えと「なぜ要る」の根拠付きです。空きを確認→予約を受け付け→当日に受付という一連の流れが、同じ枠の取り合いや時間外の申し込みでも崩れないように組んであります。"
  chapter-lead-05: "「どれくらい速く・落ちず・安全か」を、感覚ではなく数値で約束します。速さ・安定・処理量・安全の 4 点を、それぞれの測り方とセットで示します。"
  chapter-lead-06: "「ちゃんと動いている」と言える条件を、後から確かめられる形で先に決めておきます。ここを満たせば合格、という判定の基準です。"
  chapter-lead-07: "現場ニーズ → 機能 → 受入基準 が抜け漏れなく全部つながっているかを一覧で確認します。どこかが切れていれば、根拠のない機能か、確かめる基準が決まっていない機能があるサインです。"
  chapter-lead-08: "設計を始める前から決まっている外枠(守るべき決まり)と、関係する法令をまとめます。これらは交渉の余地がない前提条件です。"
  chapter-lead-09: "本文に出てくる専門語を、やさしい言葉で説明します。読んでいて分からない言葉が出てきたら、ここに戻れます。"

  # ---- 機能要件: plain (response の言い換え) ----
  plain-FR1: "患者が日時を選んで問い合わせると、その時間帯にあと何人入れるかを調べて、空き状況を表示します。"
  plain-FR2: "患者が空いている枠を選んで申し込むと、その枠を 1 件分だけ押さえて予約を確定します。"
  plain-FR3: "もう埋まっている枠に申し込もうとしたときは、予約を確定させず「空きがありません」と断ります。"
  plain-FR4: "診療していない時間帯や休診日に予約しようとしたときは受け付けず、診てもらえる日時を案内します。"
  plain-FR5: "予約が入っている間は、日時の変更やキャンセルを受け付けます。キャンセルで空いた枠は、また予約できるように戻します。"
  plain-FR6: "予約日の前日になったら、患者に「明日ご予約があります」という通知を送って来院を促します。"
  plain-FR7: "予約のときも当日の受付のときも、相手が予約した本人かを確かめてから進め、別人の予約として処理しないようにします。"

  # ---- 機能要件: rationale (data-source = N-x に接地した「なぜ要る」) ----
  rationale-FR1: "今あと何人入れるかを正しく見せないと、満枠の枠にまで申し込みが集まり、受付の混乱とクレームを招きます。予約の信頼を守るため(ニーズ N-1)、まず正確な空き状況を示します。"
  rationale-FR2: "申し込みを 1 件分の確保とひとつにして確定しないと、同じ枠に複数の予約が通り二重予約になります。受付の混乱とクレームを防ぐため(ニーズ N-1)、枠を押さえてから確定します。"
  rationale-FR3: "埋まった枠への申し込みをそのまま通すと、来院した患者を待たせたり断ることになります。予約の信頼を守るため(ニーズ N-1)、満枠の枠は確定させず断ります。"
  rationale-FR4: "診療していない時間に予約が入ると、当日に対応できず現場が混乱します。時間外や休診日の予約による混乱をなくすため(ニーズ N-4)、受け付けず案内に切り替えます。"
  rationale-FR5: "都合が変わった予約を変えられないと、来られない枠が埋まったまま無駄になります。無断キャンセルによる空き枠の損失と待ち時間をなくすため(ニーズ N-2)、変更とキャンセルを受けて枠を戻します。"
  rationale-FR6: "予約したことを忘れたままだと無断キャンセルが起き、その枠が空いたまま無駄になります。来院忘れによる損失と待ち時間をなくすため(ニーズ N-2)、前日に通知して思い出してもらいます。"
  rationale-FR7: "相手が予約した本人かを確かめずに進めると、別人の予約として処理され、医療事故や情報漏えいにつながります。取り違えを防ぐため(ニーズ N-3)、予約と受付の両方で本人かを確かめます。"

  # ---- 非機能要件: plain (target の言い換え・hero.qual 接地) ----
  plain-NFR1: "空きを問い合わせてから結果が出るまで、100 回中 95 回は 2 秒以内に収めます。"
  plain-NFR2: "サービスが使える時間の割合を、月あたり 99.5%(止まってよいのは月 約 3.6 時間まで)に保ちます。"
  plain-NFR3: "予約受付の開始直後など混み合う時間でも、1 分あたり 200 件の予約をさばけるようにします。"
  plain-NFR4: "やり取りは暗号化して途中で読まれないようにし、患者の情報を見られるのは権限のある人だけに限ります。"

  # ---- RTM: 派生数値 (req=11/need=4/iso=0/unv=0) を平易要約 ----
  rtm-summary: "この表は、11 件すべての要件が 4 つの現場ニーズのどれかにつながり(出どころのない要件は 0 件)、かつすべてが受入基準にひも付いている(ひも付けの抜けは 0 件)ことを示します。つまり、根拠のない機能も、確かめる基準が決まっていない機能もありません。"
