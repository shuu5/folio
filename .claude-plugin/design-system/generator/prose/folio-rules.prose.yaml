# folio engine B6 (folio-8ct) — spec-pack prose manifest (③「読みやすさの足場」)
#
# opus 著作物。決定的 assembler が空で出力した data-prose-slot に inject-prose.sh が
# HTML escape して注入する。slot-id ↔ 散文の 1:1 対応 (集合一致を inject が fail-closed 検査)。
#
# 各値は機械 SSoT (contract/folio-rules.spec.yaml = rules.html から機械抽出) 接地。捏造/歪曲/脱落は
# fidelity ceiling (機械 SSoT 突合 + persona-walk) の検査対象。値は単一行 (tab/改行禁止)。
#   - cover-summary は doc 全体 (section/要件/照会) に接地する。
#   - chapter-lead-NN は各章 (band) の heading/essence だけに接地し、 SSoT に無い義務や規約を新造しない。
#   - band 順: 01=§0 / 02=§2 / 03=§3 / 04=§4 / 05=§5 / 06=§6 / 07=§7 / 08=§8 / 09=§9 / 10=§10 / 11=§11 / 12=§12 / 13=照会 / 14=用語集。

slots:
  cover-summary: "folio を使う各プロジェクトが守る普遍ルール集です。 ファイルの書き方・命名・要件の記法 (EARS)・必ず守る義務・人にも読める提示の仕方を章立てで定め、 上位の原則 (constitution) や決定記録 (ADR) へ前方照会します。 本ページは元の rules.html の人間向け view を機械データから生成したもので、 機械向けの詳細記述は元の rules.html を参照してください。"

  chapter-lead-01: "まず読み方から。 このルールは folio を導入した各プロジェクトに適用され、 設定ファイルの形は §2、 必ず守る義務は §10 にまとまっています。"
  chapter-lead-02: "プロジェクトのフォルダ構成と設定ファイルの形を定めます。 folio が管理するのは設計意図を置く 3 つの領域だけで、 テストの置き場所までは縛りません。"
  chapter-lead-03: "ファイルやフォルダの名前の付け方を決めます。 HTML はすべて kebab-case、 決定記録は ADR-番号-名前、 各まとまりは入口となる README を持ちます。"
  chapter-lead-04: "設計文書の HTML としての書式を定めます。 head の必須 4 要素・本文冒頭の機械向け要約・章の囲み方に加え、 図表の使い方と最低限のアクセシビリティも示します。"
  chapter-lead-05: "文書の改訂の跡を本文に直接残すための印 (delta marker) の書き方です。 いつ何が足され消えたかを後から追えるようにします。"
  chapter-lead-06: "要件を書くときの記法 EARS を定めます。 常に・きっかけで・状態の間・機能があれば・異常時、 の 5 つの型に当てはめて曖昧さを減らします。"
  chapter-lead-07: "1 つの HTML を機械向け (精密) と人間向け (要約 + 図) の両方に同時に書く方法です。 採用は任意ですが、 採用したら守るべき構造のルールが決まっています。"
  chapter-lead-08: "文書の中で JavaScript を使う範囲を定めます。 JS は見た目の補助だけで、 要件などの内容そのものは常に静的な HTML が持ちます。"
  chapter-lead-09: "文書どうしのつなぎ方 (照会) です。 原則や要件への参照を本文内のリンクで張り、 マウスを乗せると説明が出る軽い仕組みと、 切れの無さを機械で点検します。"
  chapter-lead-10: "プロジェクトが無条件に守るべき必須義務をここに集めます。 設計編集時の合図・マージ前の自動チェック (gate)・いつ決定記録を書くか、 の 3 本立てです。"
  chapter-lead-11: "人間にも読みやすく見せるための規律です。 読者層の定義・直し方の分担・既定の見せ方・検査手順・長くなりすぎない圧縮を定めます。"
  chapter-lead-12: "要件定義書 (SRS) の人間向けプレゼンを機械の元データから生成し、 2 段階 (機械検査 + 人の確認) で品質を担保する仕組みです。"
  chapter-lead-13: "このルール集が前方照会する主要な文書を挙げます。 上位の原則 (P-x)・決定記録 (ADR)・検証仕様 (REQ-VER) への前方照会で、 folio-self-spec や relations など本文中の inline 照会は元の rules.html を参照してください — ルールは照会の終わりではありません。"
  chapter-lead-14: "本文に出てくる専門語を、 やさしい言葉で説明します。 読んでいて分からない言葉が出てきたら、 ここに戻れます。"
