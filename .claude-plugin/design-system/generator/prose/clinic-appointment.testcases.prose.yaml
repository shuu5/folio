# folio engine 段階2c (folio-uvt) — test-cases-pack prose manifest (③「読みやすさの足場」)
#
# opus 著作物。決定的 assembler が空で出力した data-prose-slot に inject-prose.sh が
# HTML escape して注入する。slot-id ↔ 散文の 1:1 対応 (集合一致を inject が fail-closed 検査)。
#
# 各値は機械 SSoT (contract/clinic-appointment.testcases.yaml) 接地。捏造/歪曲/脱落は fidelity ceiling
# (fidelity-srs 相当の機械 SSoT 突合 + persona-walk) の検査対象。値は単一行 (tab/改行禁止)。
#   - plain-TCx = ★fidelity ceiling の主対象。 当該 test case の title/precondition/steps/expected だけに接地し、
#     SSoT に無い手順・期待結果を新造しない (S4 の rationale 捏造の教訓)。
#   - 三段 trace (要件→受入→test) や cross-doc 照会先の事実は trace/cross_doc の構造から接地する。

slots:
  # ---- 表紙: このテスト仕様が約束すること (cover-summary) ----
  cover-summary: "診療予約の仕組みが「正しく動く」と言える条件を、 要件ひとつひとつに「合格の確かめ方」(受入基準) とそれを試す手順 (テストケース) で結びつけ、 SRS-CLINIC-APPT のどの要件・受入基準を検証するかをたどれるようにしたテストケース仕様です。"

  # ---- 章リード (各章の導入・章構成接地) ----
  chapter-lead-01: "まず、 このテスト仕様で何を試し、 何は試さないのかをはっきりさせます。 予約の受付・競合・拒否・変更・リマインド・本人確認は試しますが、 診察内容や会計、 通知サービス自体の到達保証は対象外です。"
  chapter-lead-02: "テストケースを 1 件ずつ並べます。 各ケースは「前提 (この状況で)・操作 (こうしたら)・期待結果 (こうなるべき)」を示し、 そのケースが検証する要件と確かめる受入基準を結びつけます。"
  chapter-lead-03: "どのテストがどの要件・受入基準を確かめているかを 1 枚の表で見渡します。 要件 → 受入基準 → テストケースの三段のつながりが、 抜けや取り違えなく追えることを示します。"
  chapter-lead-04: "本文に出てくる専門語を、 やさしい言葉で説明します。 読んでいて分からない言葉が出てきたら、 ここに戻れます。"

  # ---- 各テストケースのやさしい一言 (title/precondition/steps/expected 接地) ----
  plain-TC1: "空き枠を問い合わせたとき、 その枠の本当の残り人数 (この例では残り 2) がそのまま表示され、 まだ空きがあるのに満枠と誤表示しないことを確かめます。"
  plain-TC2: "空いている枠を選んで申し込むと、 その枠を 1 件だけ確保して予約を確定し、 残り人数がちょうど 1 減ることを確かめます。"
  plain-TC3: "残り 1 枠に 2 人がほぼ同時に申し込んでも、 確定するのは 1 件だけで、 もう一方には満枠と表示され、 二重予約が起きないことを確かめます。"
  plain-TC4: "診療時間外や休診日の枠に申し込んだとき、 予約は受け付けず、 代わりに受診できる別の日時を案内することを確かめます。"
  plain-TC5: "予約をキャンセルすると、 空いた枠がすぐ別の患者から再予約できる状態に戻ることを確かめます。"
  plain-TC6: "予約日の前日になると、 対象の予約すべてにリマインド通知が送られる (送付率 100%) ことを確かめます。"
  plain-TC7: "予約や受付の相手が本人だと確認できないときは、 確定させず差し戻し、 別人の予約として処理しないことを確かめます。"
  plain-TC8: "残りが 0 の満枠の枠に申し込んだとき、 黙って失敗させず、 満枠としてはっきり断ることを確かめます。"
