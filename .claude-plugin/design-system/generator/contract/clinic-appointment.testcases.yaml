# folio engine 段階2c (folio-uvt) — test-cases-pack 入力 contract インスタンス (instance#6 / rule-of-three)
#
# ドメイン: クリニックの診療予約システム (SRS-CLINIC-APPT と同一ドメイン)。
# doc-type = test-cases (テストケース仕様)。SRS generator と同型の機構 (決定的 assembler + opus prose + 2-gate)
# を test-cases-pack schema (scope / test_cases[] / trace / glossary) へ適用する。
#
# ★この pack の核 = 三段 trace + cross-doc 前方照会 (inter-doc cross-ref):
#   各 test case が「どの要件 (FR) を / どの受入基準 (AC) で」検証するかを SRS-CLINIC-APPT へ *前方照会* し、
#   verify-testcases.sh が参照先 SRS contract に当該 FR/AC ID が実在することを fail-closed で確かめる
#   (B0 论点2 抽象ロール graph: test_cases=verification / 照会先 requirements=claim・acceptance=verification)。
#   三段 = 要件(FR・claim) → 受入(AC・verification) → test case。集合外参照は fail-closed。
#
# 読者 = クリニックの事業責任者 (医療コーディング・IT・テスト技法の専門知識なし。専門語は必ずやさしい言葉を併記)。
# 人間層 = 「この機能が正しいと言える条件 / 何を試すか」を平易に。
# 機械層 = 詳細手順 (前提・操作・期待結果) + 三段 trace + JSON-LD。
#
# fabrication-free: 全 visible token は本 contract 由来。 plain 要約のみ prose スロットで後注入。
# core (lib/ + inject-prose.sh) は無改変流用 (rule-of-three・純粋 pack 挿入)。

doc_type: test-cases

