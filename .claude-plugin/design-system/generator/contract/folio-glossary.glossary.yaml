    slug: "marker"
    domain: "folio-closed"
    formal_def: "HTML comment による所有境界の宣言 (folio:chrome-* / folio:nav-curated / folio:landing-hero 等)。 内側が build 所有か人間所有かは機構ごとに定まる。"
    plain_slot: "plain-marker"
    cross_refs: []
  - canonical: "golden"
    en: "golden"
    slug: "golden"
    domain: "folio-closed"
