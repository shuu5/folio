  - canonical: "chrome"
    en: "chrome"
    slug: "chrome"
    domain: "folio-closed"
    formal_def: "folio build が全 page の marker 領域へ注入・維持するナビ枠 (skip-link / breadcrumb / ページ内目次 / prev-next、 ADR-0039 §2.3)。 手編集は再 build が上書きする。"
