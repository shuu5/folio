  - canonical: "fold"
    en: "fold"
    slug: "fold"
    domain: "folio-closed"
    formal_def: "details/summary による折り畳み表示。 machine 精密部や長大列を既定で畳み、 人間向け要旨を常時可視に保つ (dual-audience の human view 側)。"
    plain_slot: "plain-fold"
