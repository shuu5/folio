# folio-glossary.glossary.yaml — machine SSoT for the glossary-pack instance #1 (folio self-host)
# doc_type: glossary (canonical vocabulary). The most "terminal/lookup" doc-type for the generator:
# no chapters/EARS — a flat set of dual-audience term entries. Source SSoT (read-only):
#   - architecture/vocabulary.yaml  (terms[].canonical / domain / definition)
#   - architecture/glossary.html    (dt id="term-<slug>" + dd)
# Each term is dual-audience: human layer = plain definition (prose slot, opus-authored);
# machine layer = structured record (canonical en・slug/anchor term-<slug>・JSON-LD schema:DefinedTerm・
# cross-doc anchors data-xref-target) in a native <details> fold.
# Schema mirrors srs/adr/spec conventions: cover + terms[] (no chapters; terms are the body).
# fabrication-free: every visible token derives from this contract. plain definitions live in the
# prose manifest (folio-glossary.prose.yaml) and are injected by inject-prose.sh (core, unmodified).
doc_type: glossary
doc_id: folio-glossary
title: "folio glossary — canonical vocabulary"
version: "1.1.0"
source_spec: "architecture/glossary.html"
source_vocab: "architecture/vocabulary.yaml"
term_set_id: "folio:glossary"
term_set_name: "folio canonical vocabulary"
# graph node 識別 + 前方照会 (verify-graph.sh が読む graph メタ・HTML には render しない)。
# spec-pack 同型: meta.doc_id = 大文字 graph node ID、 cross_doc_refs = principle 終端 (P-5 canonical naming) への
# 前方照会。 glossary は canonical-name の SSoT ゆえ P-5 (constitution) を実装根拠として前方照会する非 edgeless node。
meta:
  doc_id: "FOLIO-GLOSSARY"
  doc_type: "glossary"
  # cover-head / cover-tail (core_emit_cover_head / _tail) が読む cover の SSoT
  # (spec-pack 同型: graph node 識別の doc_id/doc_type と cover メタを同居)。
  title: "folio glossary"
  eyebrow_left: "用語集 (Glossary)"
  eyebrow_right: "folio — canonical vocabulary"
  subtitle: "folio-framework 語の canonical 定義集 — 非エンジニアにも届く平易定義 + 機械可読 term レコードの dual-audience 用語集"
  version: "1.1.0"
  reader: "folio を読む全ての人 — 非エンジニアの読者と、 用語を参照する機械 (CLI / 他 spec の .term) の双方"
cross_doc_refs:
  - rel: "constitution"
    target: "P-5"
    note: "canonical naming principle — glossary が canonical-name SSoT を担う実装根拠"
# graph.principle_edge — verify-graph.sh が読む前方照会 edge (spec-pack 同型)。 cross_doc_refs (上) は
# human 可読の照会記述、 こちらは graph reader が消費する機械 edge (role=implementation・target=FOLIO-CONSTITUTION 終端)。
# glossary は canonical-name SSoT として P-5 (constitution) を実装根拠に前方照会する非 edgeless node ゆえ
# principle 終端へ到達する edge を 1 本張る (rolemap/glossary.rolemap.yaml edges[] と二重担保)。
graph:
  principle_edge:
    target_doc_id: "FOLIO-CONSTITUTION"
    role: "implementation"
cover:
  # eyebrow / title / subtitle / reader / cover-summary は .meta.* (core cover-head/_tail) が SSoT。
  # ここは bespoke の cover-meta dl (verify-glossary §6 が .cover.meta[] を突合) のみを持つ。
  meta:
    - label: "doc-type"
      value: "glossary (用語集)"
    - label: "status"
      value: "active"
    - label: "version"
      value: "1.1.0"
    - label: "用語数"
      value: "33"
    - label: "読了目安"
      value: "約 12 分"
footer:
  gen_meta: "folio design-system generator — glossary-pack (instance #1 / folio self-host)"
  # instance タグ (footer chrome の出自 span)。 assembler の hardcode を contract 由来へ parametrize
  # (folio-c5r.3 ceiling BLK-FOOTER-INSTANCE-TAG)。 本値は旧 hardcode と同一 = 出力 byte 不変。
  instance_tag: "folio self-host (instance#1)"
# approval-block (core_emit_approval_block) — doc-meta 形 (spec-pack 同型)。 用語集は
# vocabulary.yaml SSoT から派生する自己適用ゆえ stamp は self (= 承認済以外) で表示される。
approval:
  - role: "文書種別"
    who: "glossary (canonical vocabulary)"
    when: "v1.1.0"
    stamp: "active"
  - role: "生成 (engine glossary-pack)"
    who: "folio design system"
    when: "2026-06-24 生成"
    stamp: "生成"
# chrome glossary-term-table (core emit_glossary) — 主題語 terms[] とは別。 用語集ページ自体の
# 構造 (dual-audience / 機械層) を読み解くための doc-mechanics 補助語 (非エンジニアの道標)。
glossary:
  - term: "dual-audience"
    en: "dual-audience"
    def: "1 つのページを、 人が読む平易な説明と機械が読む正確な記録の両方に使う作り。 この用語集では各語が平易定義 (人) と term レコード (機械) を併せ持つ。"
  - term: "machine layer"
    en: "machine layer"
    def: "各語の折り畳み (details) の中にある、 機械が参照するための構造化記録 (正式名・anchor・domain・JSON-LD)。"
  - term: "self-host"
    en: "self-host"
    def: "folio が自分自身の言葉を folio のやり方で記述すること。 この用語集は folio 語を folio の generator で生成した自己適用 (dogfood) の一例。"
terms:
  - canonical: "spec"
    en: "spec"
    slug: "spec"
    domain: "folio-closed"
    formal_def: "WHAT (設計意図) を declarative に記述する design-intent 文書。 実装 HOW・決定 WHY と content domain を分離する (P-3 / P-7)。"
    plain_slot: "plain-spec"
    cross_refs:
      - "P-3"
      - "P-7"
  - canonical: "ADR"
    en: "ADR"
    slug: "ADR"
    domain: "folio-closed"
    formal_def: "Architecture Decision Record。 設計の WHY (決定・根拠・trade-off) を 1 決定 = 1 文書で記録する frozen な歴史資産 (ADR-worthiness は rules §10.3)。"
    plain_slot: "plain-ADR"
    cross_refs:
      - "rules §10.3"
  - canonical: "constitution"
    en: "constitution"
    slug: "constitution"
    domain: "folio-closed"
    formal_def: "folio の不変原則 (P-1〜P-14) を定める最上位 spec。 Amendment は user 承認必須・spec graph scan 対象外の特別枠 (P-10)。"
    plain_slot: "plain-constitution"
    cross_refs:
      - "P-10"
  - canonical: "invariant"
    en: "invariant"
    slug: "invariant"
    domain: "folio-closed"
    formal_def: "spec が常に満たすべき構造的・意味的な不変条件。 EARS 要件と folio validate gate が機械的に保証する。"
    plain_slot: "plain-invariant"
    cross_refs: []
  - canonical: "inventory"
    en: "inventory"
    slug: "inventory"
    domain: "folio-closed"
    formal_def: "architecture 全 spec を <head> JSON-LD から走査して生成する機械可読 index (inventory.json)。 prime digest と object-graph の projection 元 (REQ-VER-010)。"
    plain_slot: "plain-inventory"
    cross_refs:
      - "REQ-VER-010"
  - canonical: "prime"
    en: "prime"
    slug: "prime"
    domain: "folio-closed"
    formal_def: "inventory から progressive disclosure 用の Tier 1 digest を生成する subcommand。 AI への context 注入に使う (REQ-VER-012)。"
    plain_slot: "plain-prime"
    cross_refs:
      - "REQ-VER-012"
  - canonical: "cluster"
    en: "cluster"
    slug: "cluster"
    domain: "folio-closed"
    formal_def: "architecture/ 内の content domain 別ディレクトリ (spec / decisions / research)。 各 cluster は README.html を index に持つ (P-7 3-domain、 具体 dir 名は folio-self-spec §2)。"
    plain_slot: "plain-cluster"
    cross_refs:
      - "P-7"
      - "folio-self-spec §2"
  - canonical: "vocabulary"
    en: "vocabulary"
    slug: "vocabulary"
    domain: "folio-closed"
    formal_def: "folio-framework 語の canonical 定義 SSoT (vocabulary.yaml)。 glossary tooltip と glossary.html を derive する単一ソース (P-5)。"
    plain_slot: "plain-vocabulary"
    cross_refs:
      - "P-5"
  - canonical: "SSoT"
    en: "SSoT"
    slug: "SSoT"
    domain: "folio-closed"
    formal_def: "Single Source of Truth。 ある object / term の唯一の正準定義 site で、 他所はそこへ参照する。"
    plain_slot: "plain-SSoT"
    cross_refs: []
  - canonical: "dual-audience"
    en: "dual-audience"
    slug: "dual-audience"
    domain: "folio-closed"
    formal_def: "1 HTML artifact を machine (精密 normative = canonical SSoT) と human (essence + 視覚 view) の双方へ co-author する pattern (ADR-0033)。"
    plain_slot: "plain-dual-audience"
    cross_refs:
      - "ADR-0033"
  - canonical: "data-audience"
    en: "data-audience"
    slug: "data-audience"
    domain: "folio-closed"
    formal_def: "要素が machine 向けか human 向けかを示す属性 taxonomy (machine | human の 2 値)。 dual-audience の構造分離に使う。"
    plain_slot: "plain-data-audience"
    cross_refs: []
  - canonical: "EARS"
    en: "EARS"
    slug: "EARS"
    domain: "folio-closed"
    formal_def: "Easy Approach to Requirements Syntax。 要件を ubiquitous / event / state / optional / unwanted の 5 pattern で記述する記法。"
    plain_slot: "plain-EARS"
    cross_refs: []
  - canonical: "essence"
    en: "essence"
    slug: "essence"
    domain: "folio-closed"
    formal_def: "defined-object の定義 site の既存内容を再利用した plain-text 要約。 xref tooltip の生成元 (rules §9.2、 新規に書き起こさない = P-7)。"
    plain_slot: "plain-essence"
    cross_refs:
      - "rules §9.2"
      - "P-7"
  - canonical: "dogfood"
    en: "dogfood"
    slug: "dogfood"
    domain: "folio-closed"
    formal_def: "folio 自身を folio の規約・機構で構築し検証する self-application。 規約が実用に耐えるかの検証手段。"
    plain_slot: "plain-dogfood"
    cross_refs: []
  - canonical: "floor"
    en: "floor"
    slug: "floor"
    domain: "folio-closed"
    formal_def: "deterministic な機械検査層 (folio validate gate)。 二層 enforcement の下限で、 機械化可能な品質を CI で強制する (ADR-0028)。"
    plain_slot: "plain-floor"
    cross_refs:
      - "ADR-0028"
  - canonical: "ceiling"
    en: "ceiling"
    slug: "ceiling"
    domain: "folio-closed"
    formal_def: "LLM review 層 (Phase F spec-review agent)。 floor が機械検査できない意味的品質を補完する上限 (ADR-0028)。"
    plain_slot: "plain-ceiling"
    cross_refs:
