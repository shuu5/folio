  - canonical: "curated region"
    en: "curated region"
    slug: "curated-region"
    domain: "folio-closed"
    formal_def: "marker の内側を人間が author し、 folio build が verbatim に往復保全する領域 (nav-curated / landing-hero)。 chrome と所有の向きが逆。"
    plain_slot: "plain-curated-region"
    cross_refs: []
  - canonical: "remediate"
    en: "remediate"
    slug: "remediate"
    domain: "folio-closed"
    formal_def: "validate が検出した違反を解消する操作・tool の総称。 表示層 regen は folio build、 graph materialize は folio fix が分担する (rules §11.2)。"
    plain_slot: "plain-remediate"
    cross_refs:
