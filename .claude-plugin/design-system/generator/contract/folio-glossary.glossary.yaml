  - canonical: "defined-object"
    en: "defined-object"
    slug: "defined-object"
    domain: "folio-closed"
    formal_def: "一意 canonical ID を持つ参照可能 object (principle P-N / requirement REQ-* / decision ADR-NNNN / rule §)。 Class A xref の対象。"
    plain_slot: "plain-defined-object"
    cross_refs: []
  - canonical: "canonical name"
    en: "canonical name"
    slug: "canonical-name"
    domain: "folio-closed"
    formal_def: "1 entity に対する唯一の正準名 (P-5)。 表記ゆれ・同義語を禁じ、 用語の一貫性を保つ。"
    plain_slot: "plain-canonical-name"
    cross_refs:
