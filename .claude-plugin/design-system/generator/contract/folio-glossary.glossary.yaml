  - canonical: "gate"
    en: "gate"
    slug: "gate"
    domain: "folio-closed"
    formal_def: "folio validate / CI が spec 集合へ課す機械検査の単位。 block (violation = exit 1) と warn (exit code 非影響) の 2 channel を持つ (rules §10.2 / REQ-VER-023)。"
    plain_slot: "plain-gate"
    cross_refs:
