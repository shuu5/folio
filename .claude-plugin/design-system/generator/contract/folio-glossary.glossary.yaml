  - canonical: "progressive disclosure"
    en: "progressive disclosure"
    slug: "progressive-disclosure"
    domain: "folio-closed"
    formal_def: "情報を Tier 1 (digest) から Tier 2 (lead) Tier 3 (full body) へ段階開示する pattern。 folio prime の inventory digest が体現する。"
    plain_slot: "plain-progressive-disclosure"
    cross_refs: []
  - canonical: "caller-marker"
    en: "caller-marker"
    slug: "caller-marker"
    domain: "folio-closed"
    formal_def: "spec 編集を gate する hook 機構 (.folio/architect-active marker file or env var)。 folio-architect 経由の編集のみ許可する (ADR-0006)。"
    plain_slot: "plain-caller-marker"
    cross_refs:
