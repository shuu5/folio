    blocks: []

requirements:
  - id: "REQ-REL-001"
    ears_pattern: "ubiquitous"
    essence: "各 spec は該当する forward relation (dc:replaces / dc:references / folio:depends-on 等) を <head> JSON-LD に宣言する (関係が存在する場合)。"
    statement: "REQ-REL-001: Each spec SHALL declare applicable forward relations (e.g., dc:replaces, dc:references, folio:depends-on) in its <head> JSON-LD block when such relations exist."
  - id: "REQ-REL-002"
    ears_pattern: "event-driven"
    essence: "Phase X3+ tooling が active で forward relation が宣言されると、 対応する reverse relation (dc:isReplacedBy 等) を target spec に auto-materialize する。"
    statement: "REQ-REL-002: WHEN Phase X3+ tooling is active and a forward relation is declared in any spec, the system SHALL auto-materialize the corresponding reverse relation (e.g., dc:isReplacedBy) on the target spec."
  - id: "REQ-REL-003"
    ears_pattern: "ubiquitous"
    essence: "Phase X2 (現在) では reverse relation は X3 tooling 着地まで手動で記述する (SHOULD)。"
    statement: "REQ-REL-003: In Phase X2 (current), reverse relations SHOULD be written manually until X3 tooling lands."
  - id: "REQ-REL-004"
    ears_pattern: "event-driven"
    essence: "forward relation が対応 reverse を欠くと、 link-check tooling が broken-reverse violation を報告する (Phase X3+)。"
    statement: "REQ-REL-004: WHEN a forward relation lacks its corresponding reverse relation in Phase X3+, the link-check tooling SHALL report a broken-reverse violation (具体的な CLI 構文・実装機構は folio-self-spec.html §7 系 に集約)。"

