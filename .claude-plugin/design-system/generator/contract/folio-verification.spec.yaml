      - { type: note, html: "<p>本 §3 は verification framework の規範要件を EARS notation で集約する。 各 REQ-VER-* は <a href=\"rules.html#s6-ears\">rules.html §6 EARS Notation</a> に従う。 scenario YAML file への 1:1 mapping は <a href=\"https://conductofcode.io/post/easy-approach-to-requirements-syntax-and-the-segue-to-behavior-driven-development/\">EARS → Gherkin BDD 変換 pattern</a> で導出される。</p>" }
      - { type: note, html: "<p>以下、 各 REQ-VER-* は <a href=\"rules.html#s7-2-canonical-pattern\">compact 1 行 (<code>.spec-row</code>)</a> で提示する: <strong>badge + EARS pattern + <span class=\"term\" data-term=\"essence\" data-tooltip=\"defined-object の定義 site の既存内容を再利用した plain-text 要約。 xref tooltip の生成元 (rules §9.2、 新規に書き起こさない = P-7)。\">essence</span> (human 要約)</strong> が常時可視、 行をクリックすると machine canonical normative (EARS 文) が開く (最小読量で「何があるか」を一望)。 全 REQ の derives / scenario / verified 被覆は <a href=\"#s3-7-coverage-rtm\">§3.7 coverage RTM</a> に一覧し、 <strong>scenario 列が空 = link は valid だが未検証 = <code>folio validate</code> が捕らない gap</strong> を可視化する。</p>" }
      - { type: demoted, html: "<pre><code>schema_version: \"0.1\" req_id: \"REQ-VER-001\" # REQ-CM-* / REQ-CI-* / REQ-REL-* / REQ-VER-* のいずれか ears_pattern: \"ubiquitous\" # event-driven | state-driven | ubiquitous | unwanted | optional description: | 本 scenario が検証する規範要件の概要 (EARS 文)。 setup: env: { ... } # 環境変数 fixtures: [ ... ] # fixture file の配置 scenarios: - name: \"...\" # scenario 名 given: # Gherkin Given (前提) env: { KEY: \"value\" } # 環境変数 (任意、 例 FOLIO_ARCHITECT_CONTEXT) file_path: \"...\" # tool に渡す対象 file path (相対 or 絶対) content: | # Write tool 時の file 内容 (任意、 marker/JSON-LD 検出に使用) ... when: # Gherkin When (トリガー) tool: \"Edit|Write|NotebookEdit\" # mock payload の tool_name expect: exit_code: 0|2|N # § 3.3 (assertion 戦略) 参照 stderr_contains: \"...\" stdout_contains: \"...\" decision: \"allow|deny\" # informative、 主 assertion は exit_code teardown: cleanup_files: [ ... ] </code></pre> <p><strong>scenario kind</strong>: 上記は hook を mock payload で叩く <code>kind: hook</code> (既定、 省略可) の schema。 CLI subcommand (<code>bin/folio</code>) を golden 比較で検証する <code>kind: cli-golden</code> は次の field を持つ (REQ-VER-011、 hook payload field は無視)。 出力ソース <code>capture</code> (file | stdout) と比較方式 <code>compare</code> (json | text) の 2 軸で 2 種の CLI 出力に対応する:</p> <pre><code>schema_version: \"0.1\" req_id: \"REQ-VER-010\" # 検証対象 REQ kind: \"cli-golden\" # hook (既定) | cli-golden description: | CLI subcommand の出力を golden と比較する。 command: [\"inventory\"] # bin/folio に渡す引数列 capture: \"file\" # file (既定) = output_file を読む | stdout = command の stdout を捕捉 output_file: \"inventory.json\" # capture:file 時、 CLI が生成する成果物 (repo root 相対) compare: \"json\" # json (既定) = jq -S 正規化 + exclude_paths 除外 | text = plain byte-exact normalize: exclude_paths: [\".generatedAt\"] # compare:json 時、 除外する非決定的 field (jq path) golden: \"baselines/reference/inventory.golden.json\" # 期待値 (VCS 管理、 §3.4 REQ-VER-004) expect: exit_code: 0 </code></pre> <p>例: <code>inventory-gen.yaml</code> (REQ-VER-010) は <code>capture:file</code> + <code>compare:json</code> (<span class=\"term\" data-term=\"inventory\" data-tooltip=\"architecture 全 spec を &lt;head&gt; JSON-LD から走査して生成する機械可読 index (inventory.json)。 prime digest と object-graph の projection 元 (REQ-VER-010)。\">inventory</span>.json を jq 正規化比較)。 <code>prime-digest.yaml</code> (REQ-VER-012) は <code>capture:stdout</code> + <code>compare:text</code> (<code>folio prime</code> の text digest を byte-exact 比較)。</p>" }
      - { type: prose, html: "各 EARS pattern と Gherkin 構文の対応:" }
      - { type: prose, html: "変換 reference: <a href=\"https://conductofcode.io/post/easy-approach-to-requirements-syntax-and-the-segue-to-behavior-driven-development/\">conductofcode.io EARS-to-BDD</a> / <a href=\"http://requirekit.ai/core-concepts/ears-notation/\">RequireKit</a>。" }
      - { type: prose, html: "以下は <a href=\"rules.html#s10-mandatory\">rules.html §10</a> / <a href=\"relations.html#s5-3-ears\">relations.html §5.3</a> に canonical REQ を持たない、 試作 plugin の検証専用 REQ (§3.1 REQ-VER-002 の verification-specific 条項に従う)。 対応 scenario file (REQ-VER-009 は <a href=\"../../tests/e2e/runbook.md\">agent-driven runbook</a>) が SSoT 実装。" }
      - { type: prose, html: "§3 の各 REQ-VER-* と <a href=\"#s3-8-nav-req\">§3.8</a> の REQ-NAV-* を <strong>derives-from (派生元原則 / ADR) × scenario (検証 file) × verified</strong> で一覧する (trace matrix は <a href=\"constitution.html#p-13\">P-13</a> ゆえ普遍、 verified/scenario 列は verification mapping を持つ本 spec の opt-in、 <a href=\"../decisions/ADR-0033-dual-audience-hub.html\">ADR-0033 §2.6</a>)。 <code>folio validate</code> は link しか検査しないため、 <strong>scenario 列が空 = link は valid だが未検証 = validate が捕らない gap</strong> をこの列だけが一目で surface する。" }
      - { type: note, html: "<p><span class=\"badge badge--req\">VER-006</span> は「<code>permissionDecision</code> を主軸にしない」 という SHOULD NOT 設計指針で、 これを直接 assert する scenario を持たない = <strong>link は valid だが未検証の gap</strong>。 <code>folio validate</code> は捕らず、 RTM の scenario 列だけがこの gap を surface する (= coverage RTM の具体的効用)。</p>" }
      - { type: prose, html: "walkable nav (生成 index、 <a href=\"../decisions/ADR-0035-walkable-architecture-nav-derive.html\">ADR-0035</a>) と全ページ chrome (<a href=\"../decisions/ADR-0039-presentation-template-layer.html\">ADR-0039</a> §2.3) の検証 REQ。 実装時は scenario file を SSoT とする scenario-first 慣行で運用していたものを、 本節で定義 site (spec-row) に正式化する — 各 scenario の description は実装詳細 (fixture 構成・isolation 根拠) の SSoT として引き続き保持し、 本節は要件 (WHAT) の canonical 定義を担う。" }
      - { type: prose, html: "以下は folio 自身の spec 検証 (§3.6 / §3.8) と異なり、 <strong>consumer が機械 SSoT から生成する SRS プレゼン HTML</strong> の done-condition を定義する (design-system generator <code>.claude-plugin/design-system/generator/</code> が実装)。 設計 SSoT は <a href=\"../research/srs-component-taxonomy.html#s5-done-condition\">SRS 部品 taxonomy §5</a> (二層判定式 floor + ceiling)、 生成方式は <a href=\"../decisions/ADR-0042-hybrid-generation-dense-table-readability.html\">ADR-0042</a> (ハイブリッド = 構造決定的・prose のみ opus) / <a href=\"../decisions/ADR-0041-human-layer-visual-design-system.html\">ADR-0041</a>。 conformance は generator-local の <code>test-adversarial.sh</code> + <code>render-gate-srs.py --selftest</code> (sandbox scenarios でなく generator-local + CI dogfood — 生成物向けゆえ consumer の <code>folio validate</code> には入れない)。 本節は taxonomy §5 で設計済みの二層モデルを REQ-VER 形式で形式化する (新規 ADR を要さない)。" }
  - id: "s4"
    tint: "warn"
    kicker: "§4 / 実装段階"
    heading: "§4. Implementation Phase"
    essence: "実装 phase 章: 3-Step approach と、 完成形 vs 試作段階の差異を定める。"
    blocks:
      - { type: subhead, heading: "§4.1 3-Step approach", essence: "段階導入の 3-Step approach を定める (REQ-VER-005)。" }
      - type: table
        caption: "verification 段階導入 (sandbox-verification-research §6.3 を normative 化、 WHAT のみ規定)"
        headers: ["Step", "方式 (WHAT)", "API call", "適用 Phase"]
        rows:
          - ["Step 1", "hook script unit test (script の stdin / exit code / stdout を実機で verify)", "不要", "Phase X3 最初 = MUST"]
          - ["Step 2", "worktree-based integration test (test project + hook 設定で sandbox 構築)", "API key 注入で可", "Phase X3 中盤 = SHOULD"]
          - ["Step 3", "container-based isolation + integration test (外部 API allowlist 経由で外部依存制御)", "必須 (Anthropic API のみ allowlist)", "Phase X4+ = MAY"]
      - type: requirements
        ids: ["REQ-VER-005"]
      - { type: subhead, heading: "§4.2 完成形 verification vs 試作段階 verification", essence: "完成形 (long-term vision) と試作段階を 4 軸で対比 (完成形列は X5-γ で v1.0 実体へ reconcile)。" }
      - type: table
        caption: "verification flow の段階別差異"
        headers: ["軸", "完成形 (Phase X5+)", "試作段階 (Phase X3、 現在)"]
        rows:
          - ["検証対象 plugin", "§7.2 8 specialist agents 完全実装", "§7.6 minimal (1 skill + 4 hook + 6 script + 1 CLI)、 ADR-0003"]
          - ["scenario カバー範囲", "全 use case (8 specialist + 全 spec file × CRUD)", "8 use case (caller marker / path boundary / JSON-LD lint / README update / context inject / 双方向 link / inventory regen / EARS coverage、 research §7.5)"]
          - ["runner", "Inspect AI / Promptfoo 統合候補", "独自 bash runner (tests/runner.sh、 試作)"]
          - ["CI 統合", "全 scenario PR ごと auto-run + merge gating", "scenario 1-3 (caller marker / path boundary / JSON-LD lint) のみ CI gate、 残りは warn のみ"]
    machine_blocks:
      - { type: note, html: "<p>各 Step の代表的 implementation (echo + pipe 構文、 git worktree path、 Docker Compose + Squid proxy 等) は <a href=\"../research/plugin-sandbox-verification-research.html#s6-3-3step\">research §6.3</a> を参照。 これらは informative reference (HOW)、 spec MUST ではない (<a class=\"xref\" href=\"./constitution.html#p-11\" data-tooltip=\"design-intent 文書に HOW を書かない\">P-11</a> 整合、 具体 binding は <a href=\"folio-self-spec.html#s9-bindings\">folio-self-spec.html §9 Bindings</a> に隔離)。</p>" }
      - { type: note, html: "<p><strong>Step 2 の試作実装 = agent-driven runbook 方式 (REQ-VER-009)</strong>: 完成形の Step 2 は test project + hook 設定で sandbox を構築し API key 注入で自動実行する (上表)。 試作段階では、 folio plugin を load 済の Claude Code session で <strong>agent 自身が <a href=\"../../tests/e2e/runbook.md\">runbook</a> を読んで実 Edit/Write tool を操作し</strong>、 live hook (caller-marker / path-boundary / jsonld-lint / readme-index) を発火させて観察する軽量方式を採る。 一次 assertion は exit code でなく <strong>file 作成有無</strong> (PreToolUse deny ⇒ 不在 / PostToolUse notify ⇒ 存在)。 これは worktree integration の最小実現で、 container 隔離 (Step 3) は Phase X4+。 詳細と golden は <a href=\"../../tests/e2e/README.html\">tests/e2e/</a>。</p>" }
      - { type: note, html: "<p>「完成形 vs 試作段階」 の対比は本 §4.2 に集約する MUST (SSoT)。 <a href=\"folio-self-spec.html#s7-2-specialists\">folio-self-spec.html §7.2</a> は完成形 declarative description として保持、 試作段階の現状は <a href=\"folio-self-spec.html#s7-6-phase-x3-minimal\">§7.6</a> に局所化する。 本 §4.2 は両者を verification flow の文脈で対比する。</p>" }
      - { type: note, html: "<p><strong>X5-γ v1.0 reconcile (<a href=\"../decisions/ADR-0028-prose-gate-mechanization.html\">ADR-0028</a> / <a href=\"../decisions/ADR-0029-phase-f-agent-set.html\">ADR-0029</a>)</strong>: 上表「完成形」 列は long-term vision。 v1.0 の実体は: <strong>検証対象</strong> = Phase F <strong>4 review agent</strong> (ears/vocabulary/ssot/temporal、 <a href=\"folio-self-spec.html#s7-2-specialists\">§7.2 disposition aside</a>)。 <strong>runner</strong> = 独自 bash runner (<code>tests/runner.sh</code>) を維持 — Inspect AI / Promptfoo 移行は現 folio 規模では over-engineering ゆえ <strong>post-1.0 / optional</strong> に reconcile。 <strong>CI 統合</strong> = GitHub Actions で <code>folio validate</code> + <code>tests/runner.sh</code> を PR ごと auto-run する minimal CI (全 scenario merge gating の軽量版、 WS4)。</p>" }
  - id: "s5"
    tint: "ok"
    kicker: "§5 / 未解決"
    heading: "§5. Open Questions / ADR Cross-references"
    essence: "補足章: 未解決 Gap (§5.1)・起票保留 ADR 候補 (§5.2)・acceptance 済の関連 ADR (§5.3)。"
    blocks:
      - { type: subhead, heading: "§5.1 Open Questions (Gap、 sandbox-verification-research §10.1 参照)", essence: "未解決の Gap を優先度付きで一覧する (詳細は research §10.1)。" }
      - type: table
        caption: ""
        headers: ["Gap", "優先度", "概要", "resolution 条件"]
        rows:
          - ["1", "MUST", "Issue #39344 fix 確認", "もし fix 済なら permissionDecision: deny 信頼可能、 REQ-VER-003 SHOULD NOT を更新"]
          - ["2", "MUST", "runner.sh 具体仕様 (bash + yq vs Python + PyYAML)", "Phase X3 Step 1 着手時に最低限の設計選択"]
          - ["3", "SHOULD", "claude plugin validate --strict 全 check 項目", "Phase X3 validate 実行時に網羅"]
          - ["4", "SHOULD", "Issue #18312 URL", "research §2.6 Evidence Table 補完"]
          - ["5", "LOW", "fast-check 公式 docs 直接確認", "Phase X4+ TypeScript plugin 実装時"]
      - { type: subhead, heading: "§5.2 起票保留 ADR (SHOULD ランク)", essence: "起票保留 ADR 候補 (ADR-0017/0018 起票済・ADR-0014/0016 は未起票)。" }
      - type: table
        caption: ""
        headers: ["ADR ID 候補", "title", "resolution 条件"]
        rows:
          - ["ADR-0014", "EARS REQ → scenario 導出規範", "本 §3.5 で実質規範化済、 別 ADR 不要と判断 (本 commit で見送り)"]
          - ["ADR-0016", "exit code 中心 assertion 規範", "Gap 1 (Issue #39344 fix) 確認後"]
          - ["ADR-0017", "hook unit test vs integration test 境界", "起票済 2026-05-25 (Track 1/2 後 retrospective、 ADR-0017 / decisions/README §3)"]
          - ["ADR-0018", "golden baseline 管理 (2-dir model + accept workflow)", "起票済 2026-05-25 (Track 1 実装後 retrospective、 ADR-0018 / decisions/README §3)"]
      - { type: subhead, heading: "§5.3 関連 ADR (acceptance 済)", essence: "本 spec 直結の acceptance 済 ADR (ADR-0003 / 0013 / 0015)。" }
    machine_blocks:
      - { type: prose, html: "詳細は <a href=\"../research/plugin-sandbox-verification-research.html#s10-1-gaps\">plugin-sandbox-verification-research.html §10.1 Gaps</a> を参照 (重複記述しない)。" }
      - type: list
        items:
          - "<a href=\"../decisions/ADR-0003-plugin-architecture.html\">ADR-0003</a> — folio plugin minimal architecture (本 spec の前提)"
          - "<a href=\"../decisions/ADR-0013-verification-framework.html\">ADR-0013</a> — sandbox verification framework (本 spec を生んだ意思決定)"
