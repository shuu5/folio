machine_preamble:
  - { type: note, html: "<p>本文書は folio framework の <strong>verification contract 定義</strong>。 folio plugin (<a href=\"../decisions/ADR-0003-plugin-architecture.html\">ADR-0003</a> minimal scope) を <span class=\"term\" data-term=\"sandbox\" data-tooltip=\"tests/ の決定的 verification framework (scenario YAML + runner + fixtures + golden)。 hook / CLI を mock payload・隔離 root で単体検証する (ADR-0013 / 0017)。\">sandbox</span> で実機検証する枠組みを集約 <span class=\"term\" data-term=\"SSoT\" data-tooltip=\"Single Source of Truth。 ある object / term の唯一の正準定義 site で、 他所はそこへ参照する。\">SSoT</span> 化する。 具体的検証実体は <code>tests/</code> 配下に隔離 (<span class=\"term\" data-term=\"constitution\" data-tooltip=\"folio の不変原則 (P-1〜P-14) を定める最上位 spec。 Amendment は user 承認必須・spec graph scan 対象外の特別枠 (P-10)。\">constitution</span> <a href=\"./constitution.html#s2-principles\">P-11 (HOW 禁止)</a> 整合)。 「verification」 は本 contract の<strong>概念名</strong> (<a class=\"xref\" href=\"./constitution.html#p-13\" data-tooltip=\"Verification &amp; Traceability\">P-13</a> / <code>folio validate</code> / 本 spec) であり、 実体 dir 名 <code>tests/</code> (folio の bash stack 慣習) とは独立する (概念↔dir 分離、 <a href=\"../decisions/ADR-0026-test-placement-model.html\">ADR-0026</a>)。</p> <p>本 spec は <a href=\"../research/plugin-sandbox-verification-research.html\">plugin-sandbox-verification-research.html</a> (87 sources、 critique PASS) の §7 推奨設計を normative に昇格させたもの。 採用根拠は <a href=\"../decisions/ADR-0013-verification-framework.html\">ADR-0013</a>、 twill experiment-verified との境界は <a href=\"../decisions/ADR-0015-sandbox-vs-experiment-verified.html\">ADR-0015</a>。</p>" }
  - { type: note, html: "<p>本文書は IETF <a href=\"https://datatracker.ietf.org/doc/html/rfc2119\"><strong>RFC 2119</strong></a> および <a href=\"https://datatracker.ietf.org/doc/html/rfc8174\"><strong>RFC 8174</strong></a> / <a href=\"https://datatracker.ietf.org/doc/html/bcp14\"><strong>BCP 14</strong></a> に定義される MUST / SHOULD / MAY のキーワード解釈規約に従う。</p>" }

sections:
  - id: "s0"
    tint: "info"
    kicker: "§0 / 読み方"
    heading: "§0. Reader's Guide"
    essence: "読み順: §1 概念 → §2 scope → §3 EARS 規範 → §4 実装。 着手前は §1 + §3 必読。"
    blocks: []
    machine_blocks:
      - { type: note, html: "<p>本 spec を読む順序: §1 (verification contract = 3 concept 定義) → §2 (検証対象 scope) → §3 (<span class=\"term\" data-term=\"EARS\" data-tooltip=\"Easy Approach to Requirements Syntax。 要件を ubiquitous / event / state / optional / unwanted の 5 pattern で記述する記法。\">EARS</span> 規範 REQ-VER-001〜) → §4 (3-Step implementation phase + 完成形 vs 試作)。 §5 Open Questions と §6 References は補足。</p> <p>実装着手前に必読: §1 + §3。 試作 plugin (<a href=\"../decisions/ADR-0003-plugin-architecture.html\">ADR-0003</a>) を実機検証する際の規範。</p>" }
      - { type: note, html: "<p>AI agent (folio-architect SKILL) は spec edit 時に本 spec § 1〜§ 3 を必読する。 verification framework に該当する scenario file (<code>tests/scenarios/</code>) を編集する際は §3 REQ-VER-* の規範を満たすこと。 twill experiment-verified との境界 (<a href=\"../decisions/ADR-0015-sandbox-vs-experiment-verified.html\">ADR-0015</a>) を遵守し、 spec 内に HOW (script 内容 / CLI 構文 / 実行結果 snippet) を含めない (P-11)。</p>" }
  - id: "s1"
    tint: "brand"
    kicker: "§1 / 検証契約"
    heading: "§1. Verification Contract Definition"
    essence: "「verification」 の canonical 定義章 (他 spec はここへ参照、 P-5)。"
    blocks:
      - { type: subhead, heading: "§1.1 3 concept", essence: "検証の 3 state を canonical 定義する (下表)。" }
      - type: table
        caption: "folio verification states (3 concept canonical 定義)"
        headers: ["concept", "定義", "担当"]
        rows:
          - ["sandbox-verified", "plugin の機能 (use case) が tests/scenarios/ 配下の YAML scenario で実機検証され、 期待挙動 (exit code + stderr + baseline) と一致した状態", "folio framework (本 spec)"]
          - ["experiment-verified", "spec 内の各 claim (HOW level) が個別実機検証された状態 (twill plugin が採用する 4-state lifecycle: proposed / accepted / experiment-verified / archived)", "本 framework scope 外、 将来別 plugin folio-claim-verifier (仮称) で対応 (ADR-0015)"]
          - ["unverified", "上記いずれも未実施。 spec 上の規範 (EARS REQ) は存在するが実機 verify がない初期状態", "—"]
      - { type: subhead, heading: "§1.2 本 framework の scope", essence: "本 framework は sandbox-verified のみを対象とする MUST。" }
    machine_blocks:
      - { type: note, html: "<p>本 §1 は folio における「verification」 の canonical 定義を提供する。 他 spec / <span class=\"term\" data-term=\"ADR\" data-tooltip=\"Architecture Decision Record。 設計の WHY (決定・根拠・trade-off) を 1 決定 = 1 文書で記録する frozen な歴史資産 (ADR-worthiness は rules §10.3)。\">ADR</span> / research は本 §1 への cross-ref で「verification」 を参照する MUST (<a class=\"xref\" href=\"./constitution.html#p-5\" data-tooltip=\"1 entity = 1 canonical name\">P-5</a>: 1 entity = 1 canonical)。</p>" }
      - { type: demoted, html: "<p>本 verification framework (<a href=\"../decisions/ADR-0013-verification-framework.html\">ADR-0013</a>) は <strong>sandbox-verified</strong> のみを対象とする MUST。 experiment-verified は <a href=\"../decisions/ADR-0015-sandbox-vs-experiment-verified.html\">ADR-0015</a> により本 framework scope 外。</p>" }
  - id: "s2"
    tint: "violet"
    kicker: "§2 / 検証範囲"
    heading: "§2. Verification Scope"
    essence: "検証対象と非対象の境界章 (in-scope 3 カテゴリ / out-of-scope 3 種)。"
    blocks:
      - { type: subhead, heading: "§2.1 verification 対象", essence: "検証対象は plugin behavior・spec 整合性・CI gate (REQ-CI-010〜016) の 3 カテゴリ。" }
      - { type: subhead, heading: "§2.2 scope 外", essence: "scope 外 3 種と、 in-scope な hook unit test の用語整理 (用語衝突)。" }
    machine_blocks:
      - { type: demoted, html: "<p>本 framework の検証対象は以下 3 カテゴリ:</p> <ul> <li><strong>plugin behavior</strong>: folio plugin (<a href=\"../decisions/ADR-0003-plugin-architecture.html\">ADR-0003</a> minimal scope = 1 skill + 4 hook + 6 script + 1 CLI) の各 component が期待挙動を示すか</li> <li><strong>spec 整合性</strong>: spec 間の cross-ref / JSON-LD schema 準拠 / EARS pattern 完全性</li> <li><strong>CI <span class=\"term\" data-term=\"gate\" data-tooltip=\"folio validate / CI が spec 集合へ課す機械検査の単位。 block (violation = exit 1) と warn (exit code 非影響) の 2 channel を持つ (rules §10.2 / REQ-VER-023)。\">gate</span></strong>: <a href=\"rules.html#s10-2\">rules.html §10.2</a> <a class=\"xref\" href=\"./rules.html#req-ci-010\" data-tooltip=\"link-integrity gate が broken reference を検出したら CI は merge を block する MUST (P-6)。\">REQ-CI-010</a>〜016 の各 gate が想定通り fail/pass する</li> </ul>" }
      - { type: demoted, html: "<ul> <li>spec 内 claim (HOW level) の個別 verified (= experiment-verified、 <a href=\"../decisions/ADR-0015-sandbox-vs-experiment-verified.html\">ADR-0015</a>)</li> <li>具体的 implementation 詳細の <strong>white-box unit test</strong> (内部関数・分岐の網羅、 <code>.claude-plugin/scripts/</code> 配下で個別実装)。 ⚠ §4.1 Step 1 の <strong>「hook script unit test」</strong> は script の stdin / exit code / stdout の<strong>契約</strong>を実機検証する <strong>black-box 行動検証</strong>であり、 本項 (white-box 内部 test) とは別概念で <strong>in-scope</strong> (用語衝突の整理、 <a href=\"../decisions/ADR-0026-test-placement-model.html\">ADR-0026</a>)</li> <li>LLM 出力品質の eval (= AI agent eval、 Phase X4+ の Inspect AI / Promptfoo 統合候補)</li> </ul>" }
  - id: "s3"
    tint: "info"
    kicker: "§3 / EARS 要件"
    heading: "§3. EARS Requirements (REQ-VER-001〜)"
    essence: "規範要件を EARS で集約する章。 図 1 が verification model の全体像。"
    blocks:
