  - id: "s6"
    tint: "brand"
    kicker: "§6 / 参照"
    heading: "§6. References"
    essence: "本 spec が依拠する内部・外部参照の一覧。"
    blocks: []
    machine_blocks:
      - type: list
        items:
          - "<a href=\"./constitution.html\">constitution.html</a> — 不変原則 (本 spec は <a class=\"xref\" href=\"./constitution.html#p-3\" data-tooltip=\"WHAT-only\">P-3</a> WHAT-only、 <a class=\"xref\" href=\"./constitution.html#p-7\" data-tooltip=\"Content domain exclusivity\">P-7</a> Content domain exclusivity、 P-11 HOW 禁止 に従う)"
