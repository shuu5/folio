<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>render census fixture: .plain zero-width text (459 ws4o6ywe5 B5)</title>
<style>
  /* census-plainempty (folio-459 / ws4o6ywe5 cen4-C1/C1-plain-zwsp): FR2 の .plain は box (area>16) を持ち
     checkVisibility=true だが textContent が zero-width (U+200B) のみ = 平易 prose が描画されない。 旧版は
     可視性 proxy で中身を照合しなかった。 非空 rendered text (zero-width strip 後) 要求が捕捉することを固定する。 */
  body{ margin:0; padding:24px; font:16px/1.6 system-ui, sans-serif; }
  .fid{ font-weight:700; }
  .plain{ display:inline-block; min-width:160px; min-height:20px; color:#456; font-size:0.9em; }
  tr{ display:block; margin:8px 0; }
</style>
</head>
<body>
<table>
  <tr data-component="ears-requirement-row" data-req-id="FR1" id="FR1"><td><span class="fid">FR1</span> 利用者が商品を選ぶと在庫数を表示する<span class="plain">商品を選ぶと残りいくつあるか出る</span></td></tr>
  <tr data-component="ears-requirement-row" data-req-id="FR2" id="FR2"><td><span class="fid">FR2</span> 在庫不足なら警告を表示する<span class="plain">&#8203;&#8203;</span></td></tr>
  <tr data-component="nfr-metric-row" data-req-id="NFR1" id="NFR1"><td><span class="fid">NFR1</span> 応答時間は 2 秒以内</td></tr>
</table>
</body>
</html>
