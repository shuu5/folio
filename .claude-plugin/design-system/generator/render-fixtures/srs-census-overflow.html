<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>render census fixture: overflow ancestor clip (459 ws4o6ywe5)</title>
<style>
  /* census-overflow (folio-459 / ws4o6ywe5 C2-ancestor-overflow-clip): FR2 を max-height:0;overflow:hidden
     の祖先で全クリップ。 子 getBoundingClientRect は自然サイズ (area>16)・checkVisibility=true・clip-path 無し
     ゆえ旧 rendered() を素通りした。 visibleArea() が overflow:hidden 祖先の rect と交差し可視面積 0 を捕捉する。 */
  body{ margin:0; padding:24px; font:16px/1.6 system-ui, sans-serif; }
  .fid{ font-weight:700; }
  [data-component]{ display:block; margin:8px 0; }
  .clipbox{ max-height:0; overflow:hidden; }
</style>
</head>
<body>
  <div data-component="ears-requirement-row" data-req-id="FR1" id="FR1"><span class="fid">FR1</span> 利用者が商品を選ぶと在庫数を表示する</div>
  <div class="clipbox"><div data-component="ears-requirement-row" data-req-id="FR2" id="FR2"><span class="fid">FR2</span> 在庫不足なら警告を表示する</div></div>
  <div data-component="nfr-metric-row" data-req-id="NFR1" id="NFR1"><span class="fid">NFR1</span> 応答時間は 2 秒以内</div>
</body>
</html>
