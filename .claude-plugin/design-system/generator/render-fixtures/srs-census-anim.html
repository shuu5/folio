<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>render census fixture: time-axis content reveal (FF1 anim / folio-hef S1 ceiling)</title>
<style>
  /* census-anim (folio-hef S1・独立 ceiling wf_b544a704):
     content を時刻 0 で normal、 animation-delay (>150ms) 後に url() へ step-end でフリップする。
     census の単一時刻 probe (wait 150ms) は own=normal を読んで clean と誤判定した。
     census が probe 前に document.getAnimations().finish() で全 animation を終端へ進めることで、
     own が url() へ反転し own-content-fabrication が発火することを kind 完全一致で固定する。
     要件 2 / NFR 1 行は intact ゆえ census-omission は鳴らず own-content-fabrication のみ。 */
  body{ margin:0; padding:24px; font:16px/1.6 system-ui, sans-serif; }
  .fid{ font-weight:700; }
  @keyframes fab { from { content: normal; } to { content: url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='120'%20height='40'%3E%3Crect%20width='120'%20height='40'%20fill='green'/%3E%3C/svg%3E"); } }
  .fake-gloss{ animation: fab 0.01s step-end 5s forwards; }
</style>
</head>
<body>
<table>
  <tr data-component="ears-requirement-row" data-req-id="FR1"><td><span class="fid">FR1</span> 利用者が商品を選ぶと在庫数を表示する</td></tr>
  <tr data-component="ears-requirement-row" data-req-id="FR2"><td><span class="fid">FR2</span> 在庫不足なら警告を表示する</td></tr>
  <tr data-component="nfr-metric-row" data-req-id="NFR1"><td><span class="fid">NFR1</span> 応答時間は 2 秒以内</td></tr>
</table>
<div class="fake-gloss">在庫引当 — 注文確定時に在庫を確保すること</div>
</body>
</html>
