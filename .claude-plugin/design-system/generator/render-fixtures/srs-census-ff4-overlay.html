<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>render census fixture: .plain combining overlay (folio-hef.2 FF4)</title>
<style>
  /* census-ff4-overlay (folio-hef.2 FF4): FR2 の .plain は genuine 平易 prose に取り消し線 overlay
     (U+0336 COMBINING LONG STROKE OVERLAY = &#822;) を重ね判読不能化する。 base 文字にインクがあるため
     ink 計測 (FF3) は素通りする (= plainOk は 2 で omission 不発)。 codepoint allowlist の補集合 (FF4) が
     U+0336 を捕捉し plain-charclass-fabrication を発火することを固定する。 */
  body{ margin:0; padding:24px; font:16px/1.6 system-ui, sans-serif; }
  .fid{ font-weight:700; }
  .plain{ display:inline-block; min-width:160px; min-height:20px; color:#456; font-size:0.9em; }
  tr{ display:block; margin:8px 0; }
</style>
</head>
<body>
<table>
  <tr data-component="ears-requirement-row" data-req-id="FR1" id="FR1"><td><span class="fid">FR1</span> 利用者が商品を選ぶと在庫数を表示する<span class="plain">商品を選ぶと残りいくつあるか出る</span></td></tr>
  <tr data-component="ears-requirement-row" data-req-id="FR2" id="FR2"><td><span class="fid">FR2</span> 在庫不足なら警告を表示する<span class="plain">在&#822;庫&#822;が&#822;足&#822;り&#822;な&#822;い&#822;と&#822;知&#822;ら&#822;せ&#822;る</span></td></tr>
  <tr data-component="nfr-metric-row" data-req-id="NFR1" id="NFR1"><td><span class="fid">NFR1</span> 応答時間は 2 秒以内</td></tr>
</table>
</body>
</html>
