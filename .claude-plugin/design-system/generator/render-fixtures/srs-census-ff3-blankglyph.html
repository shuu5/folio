<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>render census fixture: .plain blank-glyph ink-0 (folio-hef.2 FF3)</title>
<style>
  /* census-ff3-blankglyph (folio-hef.2 FF3): FR2 の .plain は字幅ありインク0 の blank glyph
     (U+2800 BRAILLE PATTERN BLANK = &#10240;) のみ。 zero-width でも whitespace でもないため旧
     「ZW strip 後 trim 非空」heuristic を素通りするが、 読者には何も描画されない (ink=0)。 ink 計測
     (FF3) が omission に倒すことを固定する。 同時に U+2800 は plain allowlist 外ゆえ FF4 も発火する
     (defense-in-depth・期待 kind は census-omission + plain-charclass-fabrication)。 */
  body{ margin:0; padding:24px; font:16px/1.6 system-ui, sans-serif; }
  .fid{ font-weight:700; }
  .plain{ display:inline-block; min-width:160px; min-height:20px; color:#456; font-size:0.9em; }
  tr{ display:block; margin:8px 0; }
</style>
</head>
<body>
<table>
  <tr data-component="ears-requirement-row" data-req-id="FR1" id="FR1"><td><span class="fid">FR1</span> 利用者が商品を選ぶと在庫数を表示する<span class="plain">商品を選ぶと残りいくつあるか出る</span></td></tr>
  <tr data-component="ears-requirement-row" data-req-id="FR2" id="FR2"><td><span class="fid">FR2</span> 在庫不足なら警告を表示する<span class="plain">&#10240;&#10240;&#10240;</span></td></tr>
  <tr data-component="nfr-metric-row" data-req-id="NFR1" id="NFR1"><td><span class="fid">NFR1</span> 応答時間は 2 秒以内</td></tr>
</table>
</body>
</html>
