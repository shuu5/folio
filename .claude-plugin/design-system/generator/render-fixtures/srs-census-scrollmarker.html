<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>render census fixture: ::scroll-marker content fabrication (round-3c)</title>
<style>
  /* census-scrollmarker (folio-hef S1 / round-3c wf_534bb2c7 carve agent):
     scroll-marker-group の scroller 配下 .it::scroll-marker{content:…} が偽要件を可視描画する。
     scroll-pseudo arm が getComputedStyle(el,'::scroll-marker').content を走査し捏造として固定する。 */
  body{ margin:0; padding:24px; font:16px/1.6 system-ui, sans-serif; }
  .fid{ font-weight:700; }
  tr{ display:block; margin:8px 0; }
  .sc{ overflow-x:auto; scroll-marker-group: after; width:200px; white-space:nowrap; }
  .it{ display:inline-block; width:150px; }
  .it::scroll-marker{ content: 'FR98 偽: 管理者バイパス'; }
</style>
</head>
<body>
<table>
  <tr data-component="ears-requirement-row" data-req-id="FR1"><td><span class="fid">FR1</span> 利用者が商品を選ぶと在庫数を表示する</td></tr>
  <tr data-component="ears-requirement-row" data-req-id="FR2"><td><span class="fid">FR2</span> 在庫不足なら警告を表示する</td></tr>
  <tr data-component="nfr-metric-row" data-req-id="NFR1"><td><span class="fid">NFR1</span> 応答時間は 2 秒以内</td></tr>
</table>
<div class="sc"><span class="it">A</span><span class="it">B</span></div>
</body>
</html>
