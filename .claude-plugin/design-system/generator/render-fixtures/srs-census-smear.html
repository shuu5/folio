<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>render census fixture: letter-spacing smear omission (FF2 / round-3d)</title>
<style>
  /* census-smear (round-3d wf_6e852552 FF2 letter-spacing): FR1 行を letter-spacing:-0.95em で全グリフ重畳する
     (transform でない別機構)。 per-char 横密度 floor が捕捉 (transform 限定 fix では塞げないことを固定)。 */
  body{ margin:0; padding:24px; font:16px/1.6 system-ui, sans-serif; }
  .fid{ font-weight:700; } tr{ display:block; margin:8px 0; }
  tr.smear td{ letter-spacing: -0.95em; }
</style></head><body>
<table>
  <tr class="smear" data-component="ears-requirement-row" data-req-id="FR1"><td><span class="fid">FR1</span> 利用者が商品を選ぶと在庫数を表示する</td></tr>
  <tr data-component="ears-requirement-row" data-req-id="FR2"><td><span class="fid">FR2</span> 在庫不足なら警告を表示する</td></tr>
  <tr data-component="nfr-metric-row" data-req-id="NFR1"><td><span class="fid">NFR1</span> 応答時間は 2 秒以内</td></tr>
</table>
</body></html>
