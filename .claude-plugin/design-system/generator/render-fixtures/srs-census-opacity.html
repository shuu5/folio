<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>render census fixture: near-zero opacity (459 ws4o6ywe5)</title>
<style>
  /* census-opacity (folio-459 / ws4o6ywe5 C1): opacity:0.004 で FR2 を実質不可視化。 checkVisibility の
     checkOpacity は computed opacity===0 のみ false ゆえ near-zero を素通りさせた。 rendered() の祖先連鎖
     実効 opacity 閾値 (>=0.1) が捕捉することを固定する。 */
  body{ margin:0; padding:24px; font:16px/1.6 system-ui, sans-serif; }
  .fid{ font-weight:700; }
  tr{ display:block; margin:8px 0; }
  tr[data-req-id="FR2"]{ opacity:0.004; }
</style>
</head>
<body>
<table>
  <tr data-component="ears-requirement-row" data-req-id="FR1" id="FR1"><td><span class="fid">FR1</span> 利用者が商品を選ぶと在庫数を表示する</td></tr>
  <tr data-component="ears-requirement-row" data-req-id="FR2" id="FR2"><td><span class="fid">FR2</span> 在庫不足なら警告を表示する</td></tr>
  <tr data-component="nfr-metric-row" data-req-id="NFR1" id="NFR1"><td><span class="fid">NFR1</span> 応答時間は 2 秒以内</td></tr>
</table>
</body>
</html>
