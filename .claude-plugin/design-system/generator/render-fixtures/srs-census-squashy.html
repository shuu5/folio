<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>render census fixture: transform:scaleY squash omission (FF2 / round-3c)</title>
<style>
  /* census-squashy (folio-hef S1 / round-3c wf_534bb2c7 FF2 scaleY):
     FR1 行に transform:scaleY(0.02) で字を 0.4px 高に圧縮する (同位置・off-screen でなく ink は paint されるが
     可読不能)。 旧 area-only 閾値 (>16) は 293px×0.4px=117 で素通った。 visibleTextArea の最小可読高 floor
     (fontSize×0.4) が 0.4px<6.4px の fragment を非算入し FR1 を omission に倒す。 FR2/NFR1 は intact ゆえ
     totalVisible=2>0 (T7 非破綻) かつ <期待 3 = census-omission を kind 完全一致で固定する。 */
  body{ margin:0; padding:24px; font:16px/1.6 system-ui, sans-serif; }
  .fid{ font-weight:700; }
  tr{ display:block; margin:8px 0; }
  tr.squash{ transform: scaleY(0.02); transform-origin: top; }
</style>
</head>
<body>
<table>
  <tr class="squash" data-component="ears-requirement-row" data-req-id="FR1"><td><span class="fid">FR1</span> 利用者が商品を選ぶと在庫数を表示する</td></tr>
  <tr data-component="ears-requirement-row" data-req-id="FR2"><td><span class="fid">FR2</span> 在庫不足なら警告を表示する</td></tr>
  <tr data-component="nfr-metric-row" data-req-id="NFR1"><td><span class="fid">NFR1</span> 応答時間は 2 秒以内</td></tr>
</table>
</body>
</html>
