<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>render census fixture: comment omission (459)</title>
<style>
  body{ margin:0; padding:24px; font:16px/1.6 system-ui, sans-serif; }
  .fid{ font-weight:700; }
  tr{ display:block; margin:8px 0; }
</style>
</head>
<body>
<!-- census-omission (folio-459): 要件行 FR2 を HTML コメントで包み、 静的 grep
     (data-component="ears-requirement-row") は 2 件を数えるがブラウザは 1 件しか描画しない OMISSION。
     census probe が 可視 1 < 期待 2 を census-omission として捕捉することを固定する。 -->
<table>
  <tr data-component="ears-requirement-row" data-req-id="FR1"><td><span class="fid">FR1</span> 利用者が商品を選ぶと在庫数を表示する</td></tr>
  <!-- <tr data-component="ears-requirement-row" data-req-id="FR2"><td><span class="fid">FR2</span> 在庫不足なら警告を表示する</td></tr> -->
  <tr data-component="nfr-metric-row" data-req-id="NFR1"><td><span class="fid">NFR1</span> 応答時間は 2 秒以内</td></tr>
</table>
</body>
</html>
