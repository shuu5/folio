<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>render census fixture: responsive omission</title>
<style>
  /* census-responsive: 狭幅 (<=400px) でのみ要件行 FR2 を display:none で隠す条件付き OMISSION。
     375px で census-omission 発火・1280px で clean = census が viewport 直積で走り条件付き隠蔽を
     捕捉することの plumbing 証明 (gate F と同じ light/dark × 3 viewport 方針を census でも固定)。 */
  body{ margin:0; padding:24px; font:16px/1.6 system-ui, sans-serif; }
  .fid{ font-weight:700; }
  tr{ display:block; margin:8px 0; }
  @media (max-width:400px){ tr[data-req-id="FR2"]{ display:none; } }
</style>
</head>
<body>
<table>
  <tr data-component="ears-requirement-row" data-req-id="FR1"><td><span class="fid">FR1</span> 利用者が商品を選ぶと在庫数を表示する</td></tr>
  <tr data-component="ears-requirement-row" data-req-id="FR2"><td><span class="fid">FR2</span> 在庫不足なら警告を表示する</td></tr>
  <tr data-component="nfr-metric-row" data-req-id="NFR1"><td><span class="fid">NFR1</span> 応答時間は 2 秒以内</td></tr>
</table>
</body>
</html>
