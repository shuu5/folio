<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>render census fixture: .plain sub-slot omission (459 plain present==visible)</title>
<style>
  /* census-plainhide (folio-459 / .plain sub-slot 強化・独立 ceiling wxnjdmjk9):
     行コンテナは 2 件とも可視のまま、 行内の平易説明 (.plain・非エンジニア向け北極星 prose) だけを
     display:none で消す OMISSION。 row count 照合 (2/2 可視) は素通りするため、 census は .plain の
     static-present==描画可視 を別途要求する。 .plain DOM 2 件中 可視 1 件を census-omission として固定する。 */
  body{ margin:0; padding:24px; font:16px/1.6 system-ui, sans-serif; }
  .fid{ font-weight:700; }
  .plain{ display:block; color:#456; font-size:0.9em; }
  tr{ display:block; margin:8px 0; }
  tr[data-req-id="FR2"] .plain{ display:none; }
</style>
</head>
<body>
<table>
  <tr data-component="ears-requirement-row" data-req-id="FR1"><td><span class="fid">FR1</span> 利用者が商品を選ぶと在庫数を表示する<span class="plain">商品を選ぶと残りいくつあるか出る</span></td></tr>
  <tr data-component="ears-requirement-row" data-req-id="FR2"><td><span class="fid">FR2</span> 在庫不足なら警告を表示する<span class="plain">在庫が足りないとお知らせが出る</span></td></tr>
  <tr data-component="nfr-metric-row" data-req-id="NFR1"><td><span class="fid">NFR1</span> 応答時間は 2 秒以内</td></tr>
</table>
</body>
</html>
