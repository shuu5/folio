<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>render census fixture: contain:paint clip omission (FF2 / folio-hef S1)</title>
<style>
  /* census-contain (folio-hef S1 / round2 FF2 e3):
     要件表 (ears-requirement-row 2 件) を .tbl-wrap に入れ contain:paint + height:0 + overflow:visible を当てる。
     layout は自然サイズのまま paint だけ 0px box にクリップされ、 FR1/FR2 が読者から消去される (clip-path でも
     overflow:hidden でもないため rendered() の既存 5 述語を素通りした)。 NFR 行は contain 外で可視に残すため
     totalVisible=1>0 (T7 broken-render に倒れず) かつ <期待 3 = census-omission を kind 完全一致で固定する。
     visibleArea が contain:paint/strict/content 祖先を交差源に含めることで FR1/FR2 の実効面積 0 → omission。 */
  body{ margin:0; padding:24px; font:16px/1.6 system-ui, sans-serif; }
  .fid{ font-weight:700; }
  tr{ display:block; margin:8px 0; }
  .tbl-wrap{ contain: paint; height: 0; overflow: visible; }
</style>
</head>
<body>
<div class="tbl-wrap">
<table>
  <tr data-component="ears-requirement-row" data-req-id="FR1"><td><span class="fid">FR1</span> 利用者が商品を選ぶと在庫数を表示する</td></tr>
  <tr data-component="ears-requirement-row" data-req-id="FR2"><td><span class="fid">FR2</span> 在庫不足なら警告を表示する</td></tr>
</table>
</div>
<table>
  <tr data-component="nfr-metric-row" data-req-id="NFR1"><td><span class="fid">NFR1</span> 応答時間は 2 秒以内</td></tr>
</table>
</body>
</html>
