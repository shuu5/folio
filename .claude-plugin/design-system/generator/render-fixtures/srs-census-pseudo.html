<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>render census fixture: pseudo-content fabrication (2b8)</title>
<style>
  /* census-pseudo (folio-2b8): semantic セレクタ .fid に ::after の content で偽サフィックスを注入し、
     可視 ID を「FR1」→「FR1-FAKE」に見せる捏造。 <style> は make_body で空化され静的 grep を素通りする。
     census probe の反転 assert (.fid は pseudo-content を持たない) が捕捉することを固定する。 */
  body{ margin:0; padding:24px; font:16px/1.6 system-ui, sans-serif; }
  .fid{ font-weight:700; }
  .fid::after{ content:"-改竄済"; color:#a00; }
  tr{ display:block; margin:8px 0; }
</style>
</head>
<body>
<table>
  <tr data-component="ears-requirement-row" data-req-id="FR1"><td><span class="fid">FR1</span> 利用者が商品を選ぶと在庫数を表示する</td></tr>
  <tr data-component="ears-requirement-row" data-req-id="FR2"><td><span class="fid">FR2</span> 在庫不足なら警告を表示する</td></tr>
  <tr data-component="nfr-metric-row" data-req-id="NFR1"><td><span class="fid">NFR1</span> 応答時間は 2 秒以内</td></tr>
</table>
</body>
</html>
