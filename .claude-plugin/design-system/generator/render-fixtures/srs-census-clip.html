<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>render census fixture: clip-path omission (459 clipHidden)</title>
<style>
  /* census-clip (folio-459 / rendered() 強化・独立 ceiling wxnjdmjk9):
     要件行 FR2 を clip-path:inset(100%) で描画域から切り取り読者非到達にする OMISSION。 checkVisibility は
     clip-path をモデル化せず true を返す (= 旧 visible() を素通り) ため、 rendered() の clipHidden 祖先走査が
     これを捕捉する。 可視 1 < 期待 2 を census-omission として固定する。 */
  body{ margin:0; padding:24px; font:16px/1.6 system-ui, sans-serif; }
  .fid{ font-weight:700; }
  tr{ display:block; margin:8px 0; }
  tr[data-req-id="FR2"]{ clip-path: inset(100%); }
</style>
</head>
<body>
<table>
  <tr data-component="ears-requirement-row" data-req-id="FR1"><td><span class="fid">FR1</span> 利用者が商品を選ぶと在庫数を表示する</td></tr>
  <tr data-component="ears-requirement-row" data-req-id="FR2"><td><span class="fid">FR2</span> 在庫不足なら警告を表示する</td></tr>
  <tr data-component="nfr-metric-row" data-req-id="NFR1"><td><span class="fid">NFR1</span> 応答時間は 2 秒以内</td></tr>
</table>
</body>
</html>
