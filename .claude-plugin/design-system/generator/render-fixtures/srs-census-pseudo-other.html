<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>render census fixture: pseudo fabrication on non-chrome class (2b8 inverse-allowlist)</title>
<style>
  /* census-pseudo-other (folio-2b8 / inverse-allowlist 強化・独立 ceiling wxnjdmjk9):
     旧 reverse-assert は固定 7 集合 (.role/.who/.en/.gword/.gdef/.stamp/.fid) しか見ず、 契約本文を担う
     他 class (.resp 要件本文 等) への ::after content 注入を素通りさせた。 inverse-allowlist は genuine chrome
     の 3 値 whitelist に厳密一致しない非空 content を全て捏造とみなすため、 7 集合外の .resp::after も捕捉する。
     本 fixture が「whitelist 外 class への pseudo 注入」を pseudo-content-fabrication として固定する。 */
  body{ margin:0; padding:24px; font:16px/1.6 system-ui, sans-serif; }
  .fid{ font-weight:700; }
  .resp::after{ content:" ※撤回済"; color:#a00; }
  tr{ display:block; margin:8px 0; }
</style>
</head>
<body>
<table>
  <tr data-component="ears-requirement-row" data-req-id="FR1"><td><span class="fid">FR1</span> <span class="resp">利用者が商品を選ぶと在庫数を表示する</span></td></tr>
  <tr data-component="ears-requirement-row" data-req-id="FR2"><td><span class="fid">FR2</span> <span class="resp">在庫不足なら警告を表示する</span></td></tr>
  <tr data-component="nfr-metric-row" data-req-id="NFR1"><td><span class="fid">NFR1</span> <span class="resp">応答時間は 2 秒以内</span></td></tr>
</table>
</body>
</html>
