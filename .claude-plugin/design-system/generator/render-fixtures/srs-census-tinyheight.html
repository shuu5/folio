<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>render census fixture: tiny-height self clip (459 ws4o6ywe5)</title>
<style>
  /* census-tinyheight (folio-459 / ws4o6ywe5 C3-tiny-height-overflow): FR2 を height:5px;overflow:hidden で
     本文を縦に切り捨て 5px スリバーに潰す。 area = 幅×5 ≫ 16 ゆえ旧 area>16 閾値を素通りした。
     selfContentClipped() (自己 overflow:hidden ∧ scrollHeight≫clientHeight) が捕捉することを固定する。 */
  body{ margin:0; padding:24px; font:16px/1.6 system-ui, sans-serif; }
  .fid{ font-weight:700; }
  [data-component]{ display:block; margin:8px 0; }
  [data-req-id="FR2"]{ height:5px; overflow:hidden; }
</style>
</head>
<body>
  <div data-component="ears-requirement-row" data-req-id="FR1" id="FR1"><span class="fid">FR1</span> 利用者が商品を選ぶと在庫数を表示する</div>
  <div data-component="ears-requirement-row" data-req-id="FR2" id="FR2"><span class="fid">FR2</span> 在庫不足なら警告を表示する。 この文は本来複数行に渡る十分な高さを持つが 5px に切り詰められ読めない。</div>
  <div data-component="nfr-metric-row" data-req-id="NFR1" id="NFR1"><span class="fid">NFR1</span> 応答時間は 2 秒以内</div>
</body>
</html>
