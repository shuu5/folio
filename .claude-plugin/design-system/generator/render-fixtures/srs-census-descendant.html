<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>render census fixture: descendant-scope clip (FF2 descendant / folio-hef S1 ceiling round-2)</title>
<style>
  /* census-descendant (folio-hef S1・独立 ceiling wf_0900ca71 round-2):
     clip を counted 行でなく *子孫 wrapper* (.clip overflow:hidden) に置き、 その中の .inner を position で
     wrapper 外へ押し出す。 round-1 の selfPaintClipsContent は el 自身の clip しか見ず、 visibleArea は祖先しか
     走査しないため descendant-scope の clip を素通りした。 visibleTextArea が各 text node の祖先連鎖 (el→text の
     途中にある .clip を含む) の clip box と交差した実描画面積を測ることで FR1 のテキスト消去を捕捉する。
     FR1 のみ隠し FR2/NFR1 は可視に残すため totalVisible=2>0・可視 ears 1<期待 2 = census-omission。 */
  body{ margin:0; padding:24px; font:16px/1.6 system-ui, sans-serif; }
  .fid{ font-weight:700; }
  tr{ display:block; margin:8px 0; }
  .clip{ overflow:hidden; width:320px; }
  .clip .inner{ position:relative; left:2000px; }
</style>
</head>
<body>
<table>
  <tr data-component="ears-requirement-row" data-req-id="FR1"><td><div class="clip"><span class="inner"><span class="fid">FR1</span> 利用者が商品を選ぶと在庫数を表示する</span></div></td></tr>
  <tr data-component="ears-requirement-row" data-req-id="FR2"><td><span class="fid">FR2</span> 在庫不足なら警告を表示する</td></tr>
  <tr data-component="nfr-metric-row" data-req-id="NFR1"><td><span class="fid">NFR1</span> 応答時間は 2 秒以内</td></tr>
</table>
</body>
</html>
