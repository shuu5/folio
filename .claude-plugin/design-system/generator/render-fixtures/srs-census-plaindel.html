<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>render census fixture: .plain wholesale deletion (459 ws4o6ywe5 B4)</title>
<style>
  /* census-plaindel (folio-459 / ws4o6ywe5 C1-plain-wholesale-deletion): 行は可視だが .plain span を全削除。
     旧版は期待件数を DOM 自己参照 (querySelectorAll('.plain').length) で採り、 0 件で検査ごと skip した。
     期待件数を contract から caller 注入 (plainCount=2) し、 DOM 0 件 ≠ 2 を omission として捕捉する。 */
  body{ margin:0; padding:24px; font:16px/1.6 system-ui, sans-serif; }
  .fid{ font-weight:700; }
  tr{ display:block; margin:8px 0; }
</style>
</head>
<body>
<table>
  <tr data-component="ears-requirement-row" data-req-id="FR1" id="FR1"><td><span class="fid">FR1</span> 利用者が商品を選ぶと在庫数を表示する</td></tr>
  <tr data-component="ears-requirement-row" data-req-id="FR2" id="FR2"><td><span class="fid">FR2</span> 在庫不足なら警告を表示する</td></tr>
  <tr data-component="nfr-metric-row" data-req-id="NFR1" id="NFR1"><td><span class="fid">NFR1</span> 応答時間は 2 秒以内</td></tr>
</table>
</body>
</html>
