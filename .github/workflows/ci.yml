# folio verification CI — ADR-0028 §2.4 "minimal CI" (deterministic floor の merge gating)。
#
# verification.html §4.2「完成形 = 全 scenario PR ごと auto-run + merge gating」の軽量版。
# 3 段で検証する:
#   (1) folio validate    = deterministic floor 17-gate (link / jsonld / broken-reverse / vocabulary
#                           / delta-marker / dual-audience-structural / xref-resolve / xref-uniqueness
#                           / xref-tooltip-consistency / xref-completeness / glossary / nav-regen-drift
#                           / nav-dead-link / cluster-reachability / ears-coverage / render-safety / readability-floor、
#                           ADR-0020/0025/0028/0033/0034/0035/0037/0039)
#   (2) tests/runner.sh   = sandbox 全 scenario (cli-golden / hook / agent-structural、 ADR-0013/0018)
#   (3) render-gate       = render-safety ceiling (playwright headless render の flowchart 幾何 overlap
#                           + clip 検出、 verification.html REQ-VER-022 / tests/render-gate/README.md)。
#                           (1) の render-safety gate (REQ-VER-021) は pure-bash で render 後 DOM を見れず
#                           既知パターンしか lint できない floor。 本 job は実ブラウザ render で flowchart の
#                           cluster/node/label 幾何欠陥 4 class を捕捉する deterministic ceiling = folio
#                           dogfood (CI-only)。 非 flowchart 図は vacuous warning で可視化する。 決定性は
#                           vendored mermaid + pinned playwright + pinned font (fonts-noto-cjk) で担保。
#                           正式 decision 記録は ADR-0037。
#
# LLM ceiling (Phase F review agent = REQ-CI-011 declarative-form / 012 what-only) は
# 非決定的ゆえ CI 非搭載 (authoring advisory、 ADR-0028 §2.3)。 render-gate は決定的ゆえ blocking。
# Inspect AI / Promptfoo 移行は post-1.0 / optional に DEFER (ADR-0028 §2.4)。
name: folio verification

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5   # node24 ランタイム (v4 = node20 は 2026-06-02 強制移行で deprecation)

      # yq は ubuntu-latest に非搭載。 runner.sh + vocabulary gate (mikefarah/yq v4.x) が依存。
      # local 開発環境 (v4.53.2) と同 minor に pin して再現性を確保する。
      - name: Install yq (mikefarah v4.x)
        run: |
          YQ_VERSION=v4.53.2
          sudo wget -qO /usr/local/bin/yq \
            "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64"
          sudo chmod +x /usr/local/bin/yq

      - name: Verify toolchain (bash + jq + yq)
        run: |
          bash --version | head -1
          jq --version
          yq --version

      # deterministic floor。 root 既定 = architecture/ (CWD = repo root 前提)。 exit 1 で merge block。
      - name: folio validate (deterministic floor — 17 gate)
        run: .claude-plugin/bin/folio validate

      # sandbox 全 scenario。 runner は 1 scenario/起動ゆえ glob ループ。 全件集約し 1 件でも FAIL なら block。
      # (cli-golden の inventory/prime/validate-clean は spec 数変化で golden 再生成 = --accept が必要になり、
      #  未再生成 PR はここで FAIL する = golden maintenance を強制する設計。)
      - name: sandbox scenarios (tests/runner.sh — 全 scenario)
        run: |
          fail=0
          for s in tests/scenarios/*.yaml; do
            name=$(basename "$s")
            echo "::group::sandbox ${name}"
            if bash tests/runner.sh "$s"; then
              echo "PASS ${name}"
            else
              echo "::error file=${s}::sandbox scenario FAILED: ${name}"
              fail=1
            fi
            echo "::endgroup::"
          done
          if [ "$fail" -ne 0 ]; then
            echo "::error::1 件以上の sandbox scenario が FAIL しました"
            exit 1
          fi
          echo "all sandbox scenarios GREEN"

  # render-safety ceiling (verification.html REQ-VER-022、 floor = REQ-VER-021 の二層上層)。 verify (bash floor) と並列の独立 job。
  # browser 依存ゆえ別 job に隔離し、 fast な bash 検証を遅らせない。 deterministic ゆえ blocking。
  render-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10   # install + 5 ファイル render は通常数分。 apt/DL hang で runner を長時間占有させない。
    steps:
      - name: Checkout
        uses: actions/checkout@v5   # node24 ランタイム

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # CJK font を pin して text shaping を CI/local で固定する (spec 図は日本語 label を含む)。
      # --with-deps は IPAfont を入れるが、 font set を明示 pin して決定性を実装で裏打ちする (REQ: blocking gate)。
      - name: Pin CJK font (determinism)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends fonts-noto-cjk
          fc-cache -f

      # playwright 版は requirements.txt で pin → chromium revision 固定 → mermaid (vendored) + font と
      # 併せ render を三重 pin。 --with-deps で headless chromium の system lib も入れる。
      - name: Install playwright (pinned) + chromium
        run: |
          python3 -m pip install -r tests/render-gate/requirements.txt
          python3 -m playwright install --with-deps chromium

      # detector が「まだ欠陥を捕捉できる」ことを fixture で自己検証 (版 drift への回帰ガード)。
      - name: render-gate self-test (detector 検出力の floor-proof)
        run: python3 tests/render-gate/check.py --selftest

      # 全 spec を実ブラウザで render し flowchart 幾何 overlap + render 不足を検出。 1 件でも exit 1 で merge block。
      - name: render-safety ceiling (全 spec の flowchart 幾何 overlap)
        run: python3 tests/render-gate/check.py
