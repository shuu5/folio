schema_version: "0.1"
req_id: "REQ-GLOSS-002"
ears_pattern: "optional"
kind: "cli-fix"
description: |
  folio fix が opt-in doc (folio-glossary-automark=enabled) の prose 内 domain:folio-closed 用語の
  doc 初出を <span class="term" data-term data-tooltip> に auto-mark する (hover-only、 glossary へ link しない)
  (ADR-0036 §2.3/§2.4、 REQ-GLOSS-002 best-effort)。 cli-fix harness で RED→GREEN+idempotent を behavioral 検証:
    (a) pre-fix  validate が glossary-stale-tooltip で RED (既存 spec span の data-tooltip が定義と drift)
    (b) fix      が exit 0 で stale span を populate + prose ADR 初出を <span class="term"> に auto-mark
    (c) post-fix validate clean (exit 0) = 全 term mark が resolve + tooltip consistent
    (d) idempotency: 再 fix で exit 0 かつ tree sha256 不変 (初出 wrap 済 + tooltip 一致 = no-op)
    (e) post_fix_require (4 literal): auto-mark の span 生成 (hover-only) + code/見出し/div.meta skip を behavioral に捕捉
       - <span class="term" data-term="ADR" data-tooltip="…">ADR</span>   … prose 初出が span 化 (href なし)
       - <code>ADR</code>                                                  … code 内 ADR は wrap されず保全
       - §1. ADR は見出し                                                  … 見出し内 ADR は wrap されず保全
       - <div class="meta">…ADR…</div>                                    … summary 行内は wrap されず保全 (summary 抽出 [^<]* の切断防止)
    (f) post_fix_forbid (1 literal): <a class="term" が post-fix tree に皆無 = anchor 形が完全撤去された (span 統一の mutation guard)
  consumer domain (python-thing) は folio-closed map 外ゆえ auto-mark 対象にならない (domain partition)。
  既 mark の "spec" は present skip (idempotent)。 非 opt-in doc では auto-mark は no-op (real corpus 不変 = keystone)。
  scope は ADR-0036 §2.3 で trace。

# --- cli-fix scenario (fixture tree を temp copy し RED→fix→GREEN→idempotent、 runner.sh run_cli_fix) ---
fixture: "fixtures/glossary-automark"   # SCRIPT_DIR (tests) 相対の fixture tree
command: ["fix"]                        # bin/folio に渡す引数列 (--root <tmp> は harness が付与)

post_fix_require:                       # post-fix tree に grep -F で全て残るべき literal (list 形式)
  - '<span class="term" data-term="ADR" data-tooltip="decision record (auto-mark fixture)。">ADR</span>'
  - "<code>ADR</code>"
  - "§1. ADR は見出し"
  - '<div class="meta">v0.1.0-draft &middot; ADR の auto-mark skip 検証 (div.meta は summary 抽出 SSoT ゆえ mark しない)</div>'

post_fix_forbid:                        # span 統一後は auto-mark anchor 形が皆無 (transition 完了の mutation guard)
  - '<a class="term"'

expect:
  exit_code: 0                          # happy path (RED → fix 0 → GREEN → idempotent)
