schema_version: "0.1"
req_id: "REQ-VER-013/015"
ears_pattern: "event-driven"
kind: "cli-golden"
description: |
  folio validate が seeded fixtures に対し 16 件の違反を検出し exit 1 + report を出すことを
  実証する (ADR-0020 §2.1 を ADR-0025 §2.2 で 3-gate 化、 ADR-0033 で dual-audience gate 追加 /
  REQ-VER-013/015 + REQ-DA-STRUCT-1..5、 validate-clean.yaml = clean 側の violation-detection 対):
    - missing file ref : dc:references @id が実在しない file を指す (spec/missing-ref.html、 gate a)
    - broken anchor    : @id の #anchor が target file 内に存在しない (spec/broken-anchor.html、 gate a)
    - jsonld structural: @context が object でない (string) (spec/bad-jsonld.html、 gate b)
    - broken-reverse   : forward dc:references → target.html (scan 対象) に対し target が reverse
                         dc:isReferencedBy を欠く (spec/broken-anchor.html、 gate c = REQ-REL-004)。
                         broken-anchor の forward が forward-without-reverse を seed し、 fix
                         (fix-bidirectional.yaml) の detect↔remediate 対の detect 側を実証する。
    - dual-audience    : co-author card の floor 違反 5 種を 1 card 1 違反で孤立し、 verbose
                         section.req (901-905) と compact details.spec-row (911-915) の両 form で実証
                         (spec/da-violations.html、 gate g = REQ-DA-STRUCT-1..5、 ADR-0033 §2.5)。 孤立
                         human (-1) / id 不一致 (-2) / data-audience 値域 (-3) / machine 部 aria-hidden
                         (-4) / EARS-pattern 不一致 (-5) を 2 form それぞれで生む = 10 dual-audience 違反。
    - runtime-CDN      : head の <script src="https://…"> (double-quote) と
                         <script src='//…'> (single-quote + protocol-relative) の 2 形が REQ-DA-JS-2
                         vendoring 違反として block される (spec/cdn-script.html、 gate g の CDN arm =
                         ADR-0039 §2.5 / folio-ea9)。 escaped 例と <pre> 内 raw 例は mask され素通り
                         しないことも併置。
  検査 root override (--root) で fixtures を汚染なく検査する (ADR-0020 §2.3 test isolation、
  cli-golden harness は command[] のみ渡すため flag で override)。 conformance は golden baseline
  との byte-exact diff で検証 (capture:stdout, compare:text、 REQ-VER-011)。

# --- cli-golden scenario (stdout capture 版、 verification.html §3.2 + REQ-VER-011/013) ---
command: ["validate", "--root", "tests/fixtures/validate-violations"]
capture: "stdout"                                        # validate の report を stdout 捕捉
compare: "text"                                          # plain text byte-exact 比較
golden: "baselines/reference/validate-violations.golden.txt"  # 期待値 (VCS 管理、 §3.4 REQ-VER-004)

setup:
  fixtures:
    # 実体は tests/fixtures/validate-violations/spec/ に VCS 管理 (runner の
    # cli-golden handler は setup を読まないが、 validate が --root 経由で実ディスクを検査する)。
    # path-boundary hook を避けるため doc-type=fixture + Bash heredoc 作成 (Write tool 非経由)。
    - "validate-violations/spec/target.html"        # clean target (broken-anchor の参照先 #s2-decision)
    - "validate-violations/spec/missing-ref.html"   # missing file ref (./nonexistent.html)
    - "validate-violations/spec/broken-anchor.html" # broken anchor (./target.html#s9-nonexistent)
    - "validate-violations/spec/bad-jsonld.html"    # jsonld structural (@context が string)
    - "validate-violations/spec/da-violations.html" # dual-audience floor 違反 5 種 (REQ-DA-STRUCT-1..5)

expect:
  exit_code: 1                                           # violation 検出 (0=clean / 2=tool error)

# === 実装メモ (Track 3 spawn + X4-B feature-dev) ===
# validate-clean.yaml (exit 0) と対を成す violation-detection scenario。 fixtures は 5 file:
# target (clean、 anchor 参照先 + broken-anchor の forward target = scan 対象) + 4 違反 file。
# validate --root で fixtures root を検査し、 files checked: 5 / relations checked: 2 /
# violations 14 (link/jsonld/broken-reverse/dual-audience の 4 gate FAIL) を report、 exit 1。 broken-anchor.html が
# link-broken-anchor (gate a) と broken-reverse (gate c) の 2 違反を生む (target.html が dc:isReferencedBy を欠くため、
# X4-B で gate c 追加後に自然発火 = forward-without-reverse の検出実証)。 da-violations.html が dual-audience
# floor (gate g、 REQ-DA-STRUCT-1..5) の違反を section.req (901-905) + details.spec-row (911-915) の両 form で
# 1 card 1 違反 = 計 10 違反生む (ADR-0033 §2.5、 Spawn-1 floor を Spawn-2 で data-audience-keyed 2-form 被覆に generalize)。
# golden は ./runner.sh --accept で generate → 人間 review → commit。
