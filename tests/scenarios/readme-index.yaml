schema_version: "0.1"
req_id: "REQ-VER-008"
ears_pattern: "unwanted"
description: |
  Primary: ADR-0003 §2.1「PostToolUse: README update」/ §2.2 update-readme-index
  =「新 spec 追加時 README index 更新」の試作 slice (Step 4)。
  挙動の型 = option (a) 最小 check 型: 新規 .html が同 cluster の README.html index に
  未掲載なら staleness を notify (exit 2、 file 改変なし)。 ADR の「自動更新」(mutate) は
  完成形目標で、 試作 slice は staleness 検出に留める (jsonld-lint / path-boundary と同じ
  check 型で一貫、 副作用ゼロ)。 scope = S1 (README.html を持つ任意 cluster)。

  REQ-VER-008 は本 scenario 用の verification-specific REQ (verification.html §3 REQ-VER-002 の
  「verification-specific REQ-VER-* defined in this §3」 条項に従う、 path-boundary.yaml の
  REQ-VER-007 と同パターンで試作導入)。 verification.html §3 への REQ-VER-008 正式追加、
  rules.html への正式 REQ 追加、 README.html §6.2 deferred trace の更新は親/Phase 6 の担当
  (spec 編集 = caller marker 必要のため本 worktree では行わない)。
  Reference: ADR-0003 §2.1/§2.2, architecture/spec/README.html §2 (cluster index),
  relations.html §4 (inventory), verification.html §3 REQ-VER-002.

  cwd 前提: 本 scenario は fixture README を実ディスクから読むため、 runner は REPO_ROOT を
  cwd として実行する想定 (file_path は repo 相対)。 実機 Claude Code は file_path を絶対化
  するため cwd 非依存。

setup:
  env: {}
  fixtures:
    # 実体は tests/fixtures/readme-index/ に VCS 管理 (runner は読まないが
    # hook が実ディスクから読むため fixture file が存在する必要がある)。
    - "readme-index/cluster-a/README.html"        # listed-spec.html を §2 に掲載
    - "readme-index/no-index-cluster/.gitkeep"     # README.html を持たない cluster

scenarios:
  - name: "未掲載 .html を index 付き cluster に作成 → notify (staleness 検出)"
    given:
      env: {}
      file_path: "tests/fixtures/readme-index/cluster-a/orphan.html"
      content: |
        <!DOCTYPE html>
        <html><head><title>orphan</title></head><body></body></html>
    when:
      tool: "Write"
    expect:
      exit_code: 2
      stderr_contains: "not listed in cluster index"

  - name: "掲載済 .html を作成 → allow (README が listed-spec.html を掲載)"
    given:
      env: {}
      file_path: "tests/fixtures/readme-index/cluster-a/listed-spec.html"
      content: |
        <!DOCTYPE html>
        <html><head><title>listed</title></head><body></body></html>
    when:
      tool: "Write"
    expect:
      exit_code: 0

  - name: "README.html を持たない cluster に .html 作成 → allow (index 不在)"
    given:
      env: {}
      file_path: "tests/fixtures/readme-index/no-index-cluster/whatever.html"
      content: |
        <!DOCTYPE html>
        <html><head><title>no index</title></head><body></body></html>
    when:
      tool: "Write"
    expect:
      exit_code: 0

  - name: "README.html 自身の Write → allow (self 参照を強制しない)"
    given:
      env: {}
      file_path: "tests/fixtures/readme-index/cluster-a/README.html"
      content: |
        <!DOCTYPE html>
        <html><head><meta name="folio-doc-type" content="cluster-readme"></head></html>
    when:
      tool: "Write"
    expect:
      exit_code: 0

  - name: "非 .html (.md) → allow (対象外)"
    given:
      env: {}
      file_path: "tests/fixtures/readme-index/cluster-a/notes.md"
      content: "some markdown"
    when:
      tool: "Write"
    expect:
      exit_code: 0

  - name: "Edit tool は対象外 → allow (試作 minimum scope、 Write のみ gate)"
    given:
      env: {}
      file_path: "tests/fixtures/readme-index/cluster-a/orphan.html"
      content: ""
    when:
      tool: "Edit"
    expect:
      exit_code: 0

  - name: "tool_name 空 (不正 payload) → exit 2 (fail-closed)"
    given:
      env: {}
      file_path: "tests/fixtures/readme-index/cluster-a/orphan.html"
      content: ""
    when:
      tool: ""
    expect:
      exit_code: 2
      stderr_contains: "tool_name missing"

teardown:
  cleanup_files: []
