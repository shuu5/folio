<script>
(function () {
  var openedForPrint = [];
  window.addEventListener('beforeprint', function () {
    openedForPrint = [];
    var ds = document.querySelectorAll('details:not([open])');
    for (var i = 0; i < ds.length; i++) { ds[i].setAttribute('open', ''); openedForPrint.push(ds[i]); }
  });
  window.addEventListener('afterprint', function () {
    for (var i = 0; i < openedForPrint.length; i++) openedForPrint[i].removeAttribute('open');
    openedForPrint = [];
  });
  if (!document.querySelector('[data-audience]')) return;
  var bar = document.createElement('nav');
  bar.className = 'audience-toggle';
  bar.setAttribute('aria-label', '表示対象の切替');
  var states = [['both', '両方'], ['human', '人間向け'], ['machine', '機械向け']];
  for (var s = 0; s < states.length; s++) {
    (function (mode, label) {
      var b = document.createElement('button');
      b.type = 'button';
      b.textContent = label;
      b.setAttribute('aria-pressed', mode === 'both' ? 'true' : 'false');
      b.addEventListener('click', function () {
        document.body.classList.remove('audience-human', 'audience-machine');
        if (mode !== 'both') document.body.classList.add('audience-' + mode);
        var bs = bar.querySelectorAll('button');
        for (var j = 0; j < bs.length; j++) bs[j].setAttribute('aria-pressed', bs[j] === b ? 'true' : 'false');
      });
      bar.appendChild(b);
    })(states[s][0], states[s][1]);
  }
  var bc = document.querySelector('nav.breadcrumb');
  if (bc && bc.parentNode) { bc.parentNode.insertBefore(bar, bc.nextSibling); }
  else { document.body.insertBefore(bar, document.body.firstChild); }
})();
</script>
