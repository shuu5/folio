<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>render-gate selftest — content-clipped (BAD, 合成 SVG)</title>
</head>
<body>
<!--
  render-gate self-test fixture (BAD、 合成 SVG)。 detector(4) content-clipped の arm を検証する。
  svg overflow は既定 hidden のため、 svg 可視範囲 (200x100) の外へはみ出す要素は視覚上 clip され
  読めない。 mermaid が viewBox 計算を誤る (label が svg 右端を溢れる) 欠陥 class の最小再現として、
  mermaid 出力と同じ class 構造の node を x=150 width=100 (右端 250 > svg 200) で直置きする。
  期待: content-clipped (overflowPx ~50) が必ず flag される。
-->
<figure class="diagram">
<svg width="200" height="100" viewBox="0 0 200 100" xmlns="http://www.w3.org/2000/svg">
  <g class="node"><rect x="20" y="20" width="60" height="40" fill="#dde" stroke="#446"/></g>
  <g class="node"><rect x="150" y="20" width="100" height="40" fill="#edd" stroke="#644"/></g>
</svg>
<figcaption>BAD: content-clipped (合成、 右へ 50px はみ出し)</figcaption>
</figure>
</body>
</html>
