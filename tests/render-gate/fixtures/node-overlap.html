<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>render-gate selftest — node-over-node (BAD, 合成 SVG)</title>
</head>
<body>
<!--
  render-gate self-test fixture (BAD、 合成 SVG)。 detector(3) node-over-node の arm を検証する。
  mermaid (dagre layout) は通常 node を重ねて配置しないため、 実 mermaid render でこの欠陥を
  再現するのは不安定 — そこで mermaid 出力と同じ class 構造 (.node の g + rect) の SVG を直置きし、
  「node 同士が面積比 > 0.30 で交差したら必ず flag される」という detector 自体の回帰を固定する。
  2 つの node は 100x60 のうち 50x60 (= 小さい方の 50%) を共有し、 NODE_NODE_FRAC=0.30 を確実に跨ぐ。
  text/label 要素は置かない (detector(2) を誤発火させず、 (3) の単独検証にする)。
-->
<figure class="diagram">
<svg width="300" height="120" viewBox="0 0 300 120" xmlns="http://www.w3.org/2000/svg">
  <g class="node"><rect x="40" y="30" width="100" height="60" fill="#dde" stroke="#446"/></g>
  <g class="node"><rect x="90" y="30" width="100" height="60" fill="#edd" stroke="#644"/></g>
</svg>
<figcaption>BAD: node-over-node (合成、 交差 50%)</figcaption>
</figure>
</body>
</html>
