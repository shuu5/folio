<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>render-gate selftest — single-line subgraph (GOOD)</title>
<script src="../../../architecture/assets/mermaid.min.js" defer></script>
</head>
<body>
<!--
  render-gate self-test fixture (GOOD)。 subgraph タイトルを単行に畳んだ正しい形 =
  cluster-label が ~24px に収まり子ノードと overlap しない。 check.py --selftest が「必ず clean」を期待する。
-->
<figure class="diagram">
<pre class="mermaid">
flowchart TB
  subgraph PG["<b>Phase F</b> — 7 並列固定"]
    direction TB
    B1["reviewer 1<br/>(node label の br は可)"] --> B2[reviewer 2]
  end
</pre>
<figcaption>GOOD: 単行 subgraph タイトル</figcaption>
</figure>
<script>
window.addEventListener('DOMContentLoaded', async () => {
  if (!window.mermaid) return;
  mermaid.initialize({ startOnLoad: false, securityLevel: 'antiscript', theme: 'base', flowchart: { useMaxWidth: false } });
  try { await mermaid.run(); } catch (e) {}
});
</script>
</body>
</html>
