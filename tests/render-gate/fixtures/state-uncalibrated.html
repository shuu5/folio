<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>render-gate selftest — stateDiagram uncalibrated</title>
<script src="../../../architecture/assets/mermaid.min.js" defer></script>
</head>
<body>
<!--
  render-gate self-test fixture (uncalibrated)。 stateDiagram-v2 は sequence と違い .node を
  「出す」ため、 .node 有無だけでは flowchart と区別できない (vacuous にならない)。 probe は
  図型 (aria-roledescription) で flowchart 較正外と分類し、 check.py が
  [warn] uncalibrated-coverage を出す。 この case は「state 図が flowchart 扱いで silent に
  『検査済 clean』を返す」誤分類への回帰ガード。
-->
<figure class="diagram">
<pre class="mermaid">
stateDiagram-v2
  [*] --> Draft
  Draft --> Accepted: approve
  Accepted --> [*]
</pre>
<figcaption>uncalibrated: stateDiagram (.node を出すが flowchart 較正外)</figcaption>
</figure>
<script>
window.addEventListener('DOMContentLoaded', async () => {
  if (!window.mermaid) return;
  mermaid.initialize({ startOnLoad: false, securityLevel: 'antiscript', theme: 'base' });
  try { await mermaid.run(); } catch (e) {}
});
</script>
</body>
</html>
