<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>render-gate selftest — scaled multiline subgraph (BAD, useMaxWidth:true)</title>
<script src="../../../architecture/assets/mermaid.min.js" defer></script>
</head>
<body>
<!--
  render-gate self-test fixture (BAD、 縮小 render)。 detector(1) の scale 正規化を検証する。
  useMaxWidth:true + 幅 150px の容器で svg を viewBox より縮小 render させる (scale ~0.5)。
  多行 cluster-label は intrinsic ~48px だが rendered では ~24px に縮み、 絶対閾値 30px を
  「正規化なしでは」下回る — つまり probe の viewBox→rendered 正規化 (h / scaleY) が
  効いている場合に限り cluster-label-multiline が発火する。 正規化を壊す mutation
  (除算の削除・逆転) はこの case が捕捉する。
-->
<figure class="diagram" style="width:150px">
<pre class="mermaid">
flowchart TB
  subgraph PF["<b>Phase F</b><br/>(7 並列固定)"]
    direction TB
    B1[reviewer 1] --> B2[reviewer 2]
  end
</pre>
<figcaption>BAD: 多行 subgraph タイトル (縮小 render、 scale&lt;1)</figcaption>
</figure>
<script>
window.addEventListener('DOMContentLoaded', async () => {
  if (!window.mermaid) return;
  mermaid.initialize({ startOnLoad: false, securityLevel: 'antiscript', theme: 'base', flowchart: { useMaxWidth: true } });
  try { await mermaid.run(); } catch (e) {}
});
</script>
</body>
</html>
