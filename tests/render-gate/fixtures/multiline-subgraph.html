<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>render-gate selftest — multiline subgraph (BAD)</title>
<script src="../../../architecture/assets/mermaid.min.js" defer></script>
</head>
<body>
<!--
  render-gate self-test fixture (BAD)。 subgraph タイトルに <br/> を入れた多行タイトル =
  mermaid が cluster-label の縦 padding を 1 行分しか確保せず 2 行目が子ノードに overlap する。
  check.py --selftest が「必ず overlap 検出」を期待する。 node label の <br/> は overlap しない (対照)。
-->
<figure class="diagram">
<pre class="mermaid">
flowchart TB
  subgraph PF["<b>Phase F</b><br/>(7 並列固定)"]
    direction TB
    A1["reviewer 1<br/>(node label の br は可)"] --> A2[reviewer 2]
  end
</pre>
<figcaption>BAD: 多行 subgraph タイトル</figcaption>
</figure>
<script>
window.addEventListener('DOMContentLoaded', async () => {
  if (!window.mermaid) return;
  mermaid.initialize({ startOnLoad: false, securityLevel: 'antiscript', theme: 'base', flowchart: { useMaxWidth: false } });
  try { await mermaid.run(); } catch (e) {}
});
</script>
</body>
</html>
