<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>render-gate selftest — label-over-foreign-node (BAD, 合成 SVG)</title>
</head>
<body>
<!--
  render-gate self-test fixture (BAD、 合成 SVG)。 detector(2) label-over-foreign-node の
  単独 arm を検証する。 どの .node にも属さない .nodeLabel (foreignObject 内、 mermaid の
  htmlLabels 出力と同 class 構造) を別 node の矩形に面積比 ~0.75 で重ね、 OVERLAP_FRAC=0.15 を
  確実に跨ぐ。 node 同士は離す (detector(3) を誤発火させず (2) の単独検証にする)。
-->
<figure class="diagram">
<svg width="300" height="120" viewBox="0 0 300 120" xmlns="http://www.w3.org/2000/svg">
  <g class="node"><rect x="40" y="30" width="100" height="60" fill="#dde" stroke="#446"/></g>
  <g class="node"><rect x="180" y="30" width="80" height="60" fill="#edd" stroke="#644"/></g>
  <foreignObject x="160" y="45" width="80" height="24">
    <div xmlns="http://www.w3.org/1999/xhtml" class="nodeLabel" style="font: 14px sans-serif;">overlap label</div>
  </foreignObject>
</svg>
<figcaption>BAD: label-over-foreign-node (合成、 label が他 node に 75% 重なる)</figcaption>
</figure>
</body>
</html>
