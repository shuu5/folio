schema_version: "0.1"
req_id: "REQ-CM-004"
ears_pattern: "unwanted"
description: |
  Primary: ADR-0003 §2.1 path boundary — spec dir 外への spec file 作成を block。
  試作 minimum (Option Pragmatic): Write tool + `.html` + content marker
  `<meta name="folio-doc-type" content="spec">` の同時条件で判定。
  spec_path 外なら deny。
  Note: REQ-CM-004 は試作で導入。 rules.html §10.1 への昇格は Phase X3 後段で検討。
  Reference: ADR-0003 §2.1, verification.html §3.3 REQ-VER-003.

setup:
  env: {}
  fixtures: []

scenarios:
  - name: "spec を spec_path 配下に作成 → allow"
    given:
      env: {}
      file_path: "scratch/specs/new-feature.html"
      content: |
        <!DOCTYPE html>
        <html><head>
        <meta name="folio-doc-type" content="spec">
        </head></html>
    when:
      tool: "Write"
    expect:
      exit_code: 0

  - name: "spec を spec_path 外 (scratch/random/) で作成 → deny"
    given:
      env: {}
      file_path: "scratch/random/new-feature.html"
      content: |
        <!DOCTYPE html>
        <html><head>
        <meta name="folio-doc-type" content="spec">
        </head></html>
    when:
      tool: "Write"
    expect:
      exit_code: 2
      stderr_contains: "folio path boundary check"

  - name: "cluster-readme (.html, spec ではない) を spec_path 外で作成 → allow"
    given:
      env: {}
      file_path: "scratch/verification/README.html"
      content: |
        <!DOCTYPE html>
        <html><head>
        <meta name="folio-doc-type" content="cluster-readme">
        </head></html>
    when:
      tool: "Write"
    expect:
      exit_code: 0

  - name: "ADR (.html, doc-type=adr) を spec_path 外で作成 → allow"
    given:
      env: {}
      file_path: "scratch/decisions/ADR-9999-test.html"
      content: |
        <!DOCTYPE html>
        <html><head>
        <meta name="folio-doc-type" content="adr">
        </head></html>
    when:
      tool: "Write"
    expect:
      exit_code: 0

  - name: "Edit tool は対象外 → allow (たとえ spec を spec_path 外で編集しても)"
    given:
      env: {}
      file_path: "scratch/random/spec.html"
    when:
      tool: "Edit"
    expect:
      exit_code: 0

  - name: "非 .html を spec_path 外で作成 → allow"
    given:
      env: {}
      file_path: "scratch/random/notes.md"
      content: "some markdown"
    when:
      tool: "Write"
    expect:
      exit_code: 0

  - name: "属性順序 reverse (content 先 → name 後) でも検出"
    given:
      env: {}
      file_path: "scratch/random/spec.html"
      content: |
        <html><head>
        <meta content="spec" name="folio-doc-type">
        </head></html>
    when:
      tool: "Write"
    expect:
      exit_code: 2
      stderr_contains: "folio path boundary check"

teardown:
  cleanup_files: []
